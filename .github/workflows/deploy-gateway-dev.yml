name: Deploy Gateway (dev)

# Gateway-only dev deploy. The standalone LLM gateway lives on the `gateway`
# branch (it was pulled out of main). ArgoCD `kortix-gateway-dev` GitOps-syncs
# THIS branch at infra/k8s/charts/kortix-gateway + infra/k8s/envs/dev/gateway-values.yaml.
#
# Every push to `gateway` that touches the gateway builds a multi-arch image
# (kortix/kortix-gateway:dev-<sha8>) and bumps the dev values ON THIS BRANCH so
# Argo rolls it. Deliberately independent of deploy-dev.yml (which deploys the
# main-tracking API/frontend to kortix-dev) — this never touches those.

on:
  push:
    branches: [gateway]
    paths:
      - 'apps/llm-gateway/**'
      - 'packages/llm-gateway/**'
      - 'packages/shared/**'
      - 'infra/k8s/charts/kortix-gateway/**'
  workflow_dispatch:

concurrency:
  group: deploy-gateway-dev
  cancel-in-progress: true

jobs:
  build:
    name: Build gateway image (multi-arch)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - id: meta
        run: |
          echo "tag=dev-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "version=$(cat VERSION 2>/dev/null || echo 0.0.0)-dev.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/llm-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KORTIX_VERSION=${{ steps.meta.outputs.version }}
            KORTIX_COMMIT=${{ github.sha }}
          tags: |
            kortix/kortix-gateway:dev-latest
            kortix/kortix-gateway:${{ steps.meta.outputs.tag }}

  deploy:
    name: Deploy gateway to dev (GitOps)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC → read the dev cluster
      contents: write # push the values bump to the gateway branch
    env:
      AWS_REGION: us-west-2
      CLUSTER: kortix-dev-eks
      NAMESPACE: kortix-dev
      APP: kortix-gateway
      VALUES: infra/k8s/envs/dev/gateway-values.yaml
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-eks-deploy-dev
      TAG: ${{ needs.build.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gateway
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump dev gateway image tag on the gateway branch
        run: |
          set -euo pipefail
          if [ "$(yq '.image.tag' "$VALUES")" = "$TAG" ]; then
            echo "values already at $TAG — no commit needed."
          else
            TAG="$TAG" yq -i '.image.tag = strenv(TAG)' "$VALUES"
            git config user.name  "kortix-ci[bot]"
            git config user.email "kortix-ci[bot]@users.noreply.github.com"
            git add "$VALUES"
            git commit -m "chore(dev-eks): deploy gateway ${TAG} [skip ci]"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin gateway && git push origin gateway && break
              echo "push attempt ${attempt} lost a race — retrying"; sleep 3
            done
          fi

      # The image build + values bump above are the deploy (ArgoCD GitOps rolls
      # the rest). The steps below only WATCH the rollout for fast feedback, and
      # need cluster access — best-effort so the run stays green even if the dev
      # deploy IAM role doesn't trust this branch yet (it currently trusts only
      # `main`; add refs/heads/gateway to kortix-gha-eks-deploy-dev to enable).
      - name: Configure AWS credentials (OIDC)
        id: aws
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          retry-max-attempts: 1

      - name: Update kubeconfig
        if: steps.aws.outcome == 'success'
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      - name: Wait for gateway Deployment rolled out @ ${{ env.TAG }}
        if: steps.aws.outcome == 'success'
        continue-on-error: true
        run: |
          set -uo pipefail
          for i in $(seq 1 40); do
            img="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            desired="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.replicas}' 2>/dev/null || true)"
            avail="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)"
            echo "($i/40) image=${img:-?} available=${avail:-0}/${desired:-?}"
            if printf '%s' "$img" | grep -q ":${TAG}$" && [ -n "$desired" ] && [ "${avail:-0}" = "$desired" ]; then
              echo "✓ EKS dev gateway rolled out on :${TAG}"; exit 0
            fi
            sleep 15
          done
          echo "::warning::dev gateway not rolled out to :${TAG} (Argo lag or unhealthy rollout — check ops.kortix.com)."

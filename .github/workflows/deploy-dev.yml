name: Deploy Dev

# DEV pipeline. `main` is the dev branch: every push auto-deploys everything as
# a DEV build versioned `$(cat VERSION)-dev.<sha8>`.
#
#   - API image   → kortix/kortix-api:dev-<sha8> + :dev-latest, then rolled onto
#                   the ECS Fargate dev service (kortix-dev) via GitHub OIDC.
#   - Frontend    → kortix/kortix-frontend:dev-<sha8> + :dev-latest (image is for
#                   self-hosters). dev.kortix.com itself is deployed by Vercel
#                   from `main` via Vercel's own Git integration — no deploy step.
#   - CLI         → 4 cross-compiled binaries published to the mutable
#                   `dev-latest` GitHub prerelease (default API base dev-api).
#   - Desktop     → signed installers published into the same `dev-latest`
#                   prerelease (default URL dev.kortix.com).
#
# Promotion to production is a separate, manual workflow (promote.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ── Detect what changed (so unrelated surfaces are skipped) ─────────────────
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
      cli: ${{ steps.filter.outputs.cli }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'apps/kortix-sandbox-agent-server/**'
              - 'apps/sandbox/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'VERSION'
            frontend:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'VERSION'
            cli:
              - 'apps/cli/**'
              - 'packages/starter/**'
              - 'scripts/install.sh'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'VERSION'
            desktop:
              - 'apps/desktop/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'VERSION'
      - name: Summary
        run: |
          {
            echo "### Changes detected"
            echo "- API: ${{ steps.filter.outputs.api }}"
            echo "- Frontend: ${{ steps.filter.outputs.frontend }}"
            echo "- CLI: ${{ steps.filter.outputs.cli }}"
            echo "- Desktop: ${{ steps.filter.outputs.desktop }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build + push the multi-arch API image ───────────────────────────────────
  build-api:
    name: Build API image (multi-arch)
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        # The Dockerfile has no KORTIX_VERSION ARG, so the dev version is not
        # injected into the image — the artifact is identified by its :dev-<sha8>
        # tag (created in the tag-api job below).
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SERVICE=apps/api
          tags: |
            kortix/kortix-api:dev-latest

  # docker/build-push-action's `tags` does not support shell slicing, so we
  # retag the published :dev-latest to the :dev-<sha8> immutable tag here.
  tag-api:
    name: Tag API dev-<sha8>
    needs: [detect-changes, build-api]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.tag.outputs.image }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Retag :dev-latest → :dev-<sha8> (multi-arch manifest)
        id: tag
        run: |
          set -euo pipefail
          SHA8="${GITHUB_SHA::8}"
          docker buildx imagetools create \
            --tag "kortix/kortix-api:dev-${SHA8}" \
            "kortix/kortix-api:dev-latest"
          echo "image=kortix/kortix-api:dev-${SHA8}" >> "$GITHUB_OUTPUT"

  # ── Roll the dev ECS service onto the freshly-built image ───────────────────
  # The task definition pins kortix/kortix-api:dev-latest; force-new-deployment
  # re-pulls that tag and rolls the service. Auth via OIDC (no long-lived keys).
  deploy-api:
    name: Deploy API to dev (ECS)
    needs: [detect-changes, tag-api]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write # assume the AWS role via GitHub OIDC
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::935064898258:role/kortix-gha-ecs-deploy
          aws-region: us-west-2
      - name: Roll the ECS service onto the freshly-built image
        run: |
          set -euo pipefail
          echo "Rolling ECS service kortix-dev (image ${{ needs.tag-api.outputs.image }} via :dev-latest)…"
          aws ecs update-service --cluster kortix-dev --service kortix-dev --force-new-deployment >/dev/null
          aws ecs wait services-stable --cluster kortix-dev --services kortix-dev
          aws ecs describe-services --cluster kortix-dev --services kortix-dev \
            --query 'services[0].{running:runningCount,desired:desiredCount,rollout:deployments[0].rolloutState}' \
            --output table
      - name: Summary
        if: always()
        run: |
          {
            echo "### Deployed API → **dev** (ECS Fargate)"
            echo "Image: \`${{ needs.tag-api.outputs.image }}\` rolled onto ECS service \`kortix-dev\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build + push the multi-arch frontend image ──────────────────────────────
  # dev.kortix.com is served by Vercel (auto-deploys from `main`); this image is
  # for self-hosters, so there is no deploy step here.
  build-frontend:
    name: Build frontend image (multi-arch)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - run: git submodule sync --recursive && git submodule update --init --recursive --remote
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"
      - name: Build frontend standalone output
        run: pnpm --filter ./apps/web build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8008/v1
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: local-build-placeholder-anon-key
          NEXT_PUBLIC_BILLING_ENABLED: "false"
          NEXT_OUTPUT: standalone
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            kortix/kortix-frontend:dev-latest
      - name: Retag :dev-latest → :dev-<sha8>
        run: |
          set -euo pipefail
          SHA8="${GITHUB_SHA::8}"
          docker buildx imagetools create \
            --tag "kortix/kortix-frontend:dev-${SHA8}" \
            "kortix/kortix-frontend:dev-latest"
          echo "Pushed kortix/kortix-frontend:dev-${SHA8} + :dev-latest"

  # ── Build dev CLI (4 targets on one Linux runner via Bun cross-compile) ─────
  build-cli:
    name: Build dev CLI (all targets)
    needs: detect-changes
    if: needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps (pnpm)
        # The repo's lockfile is pnpm format; `bun install` cannot migrate it
        # ("PnpmLockfileTooOld"), so install deps with pnpm and compile with bun.
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build every target (Bun cross-compile)
        run: |
          set -euo pipefail
          CLI_VERSION="$(cat VERSION)-dev.${GITHUB_SHA::8}"
          API_BASE="https://dev-api.kortix.com"
          mkdir -p artifacts
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "↻ building kortix-$t (cli $CLI_VERSION)"
            bun build \
              --compile \
              --minify \
              --target="bun-$t" \
              --define="process.env.KORTIX_CLI_VERSION=\"${CLI_VERSION}\"" \
              --define="process.env.KORTIX_DEFAULT_API_BASE=\"${API_BASE}\"" \
              --outfile="artifacts/kortix-$t" \
              apps/cli/src/index.ts
          done
          cd artifacts
          chmod +x kortix-*
          sha256sum kortix-* > SHA256SUMS
          ls -lh

      - name: Smoke test (native linux-x64)
        run: ./artifacts/kortix-linux-x64 version

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
            artifacts/SHA256SUMS
          if-no-files-found: error

  # ── Build dev desktop installers (per-OS signed matrix) ─────────────────────
  build-desktop:
    name: Build dev desktop ${{ matrix.target_pretty }}
    needs: detect-changes
    if: needs.detect-changes.outputs.desktop == 'true'
    runs-on: ${{ matrix.runner }}
    env:
      DESKTOP_PRODUCT_NAME: Kortix Dev
      DESKTOP_IDENTIFIER: com.kortix.desktop.dev
      DESKTOP_URL: https://dev.kortix.com/dashboard
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_pretty: macos-arm64
            runner: macos-14
            bundles: dmg
            artifact: desktop-macos-arm64
            files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - target_pretty: macos-x64
            runner: macos-13
            bundles: dmg
            artifact: desktop-macos-x64
            files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - target_pretty: windows-x64
            runner: windows-2022
            bundles: msi
            artifact: desktop-windows-x64
            files: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          - target_pretty: linux-x64
            runner: ubuntu-22.04
            bundles: appimage
            artifact: desktop-linux-x64
            files: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            wget

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @kortix/desktop
        env:
          npm_config_engine_strict: "false"

      - name: Compute dev version
        id: ver
        shell: bash
        run: echo "version=$(cat VERSION)-dev.${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          case "${{ runner.os }}" in
            macOS)
              test -n "$APPLE_CERTIFICATE" || { echo "Missing APPLE_CERTIFICATE"; exit 1; }
              test -n "$APPLE_CERTIFICATE_PASSWORD" || { echo "Missing APPLE_CERTIFICATE_PASSWORD"; exit 1; }
              if [ -n "$APPLE_API_ISSUER" ] || [ -n "$APPLE_API_KEY" ] || [ -n "$APPLE_API_KEY_P8" ]; then
                test -n "$APPLE_API_ISSUER" || { echo "Missing APPLE_API_ISSUER"; exit 1; }
                test -n "$APPLE_API_KEY" || { echo "Missing APPLE_API_KEY"; exit 1; }
                test -n "$APPLE_API_KEY_P8" || { echo "Missing APPLE_API_KEY_P8"; exit 1; }
              else
                test -n "$APPLE_ID" || { echo "Missing APPLE_ID"; exit 1; }
                test -n "$APPLE_PASSWORD" || { echo "Missing APPLE_PASSWORD"; exit 1; }
                test -n "$APPLE_TEAM_ID" || { echo "Missing APPLE_TEAM_ID"; exit 1; }
              fi
              ;;
            Windows)
              test -n "$WINDOWS_CERTIFICATE" || { echo "Missing WINDOWS_CERTIFICATE"; exit 1; }
              test -n "$WINDOWS_CERTIFICATE_PASSWORD" || { echo "Missing WINDOWS_CERTIFICATE_PASSWORD"; exit 1; }
              test -n "$WINDOWS_CERTIFICATE_THUMBPRINT" || { echo "Missing WINDOWS_CERTIFICATE_THUMBPRINT"; exit 1; }
              ;;
          esac

      - name: Prepare macOS notarization key
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_P8" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Configure dev desktop build
        shell: bash
        env:
          DESKTOP_VERSION: ${{ steps.ver.outputs.version }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/desktop/src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          // Tauri requires a strict semver version; dev builds use the clean
          // X.Y.Z so the bundler accepts it (the -dev.<sha> suffix is not valid
          // for Windows MSI/macOS bundle versions).
          config.version = (process.env.DESKTOP_VERSION || '0.0.0').split('-')[0];
          config.productName = process.env.DESKTOP_PRODUCT_NAME;
          config.identifier = process.env.DESKTOP_IDENTIFIER;
          if (process.env.WINDOWS_CERTIFICATE_THUMBPRINT) {
            config.bundle ||= {};
            config.bundle.windows ||= {};
            config.bundle.windows.certificateThumbprint = process.env.WINDOWS_CERTIFICATE_THUMBPRINT;
            config.bundle.windows.digestAlgorithm = 'sha256';
            config.bundle.windows.timestampUrl = process.env.WINDOWS_TIMESTAMP_URL || 'http://timestamp.digicert.com';
          }
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          NODE

      - name: Prepare desktop shell assets
        run: pnpm --filter @kortix/desktop run prepare-assets

      - name: Build desktop installer
        run: pnpm --filter @kortix/desktop tauri build --bundles ${{ matrix.bundles }}
        env:
          KORTIX_DESKTOP_DEFAULT_URL: ${{ env.DESKTOP_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  # ── Publish/refresh the single mutable `dev-latest` prerelease ──────────────
  publish-dev-release:
    name: Publish dev-latest prerelease
    needs: [detect-changes, build-cli, build-desktop]
    # Run whenever the CLI and/or desktop built (and didn't fail). `always()`
    # lets us proceed even if one of the two was skipped by change-detection.
    if: |
      always() &&
      (needs.build-cli.result == 'success' || needs.build-desktop.result == 'success')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        if: needs.build-cli.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: artifacts/

      - name: Download desktop artifacts
        if: needs.build-desktop.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts/
          pattern: desktop-*
          merge-multiple: true

      - name: Assemble release assets
        run: |
          set -euo pipefail
          mkdir -p release
          # CLI binaries + checksums (if present)
          if [ -d artifacts ]; then
            cp -v artifacts/* release/ 2>/dev/null || true
          fi
          # Desktop installers (if present)
          if [ -d desktop-artifacts ]; then
            find desktop-artifacts -maxdepth 1 -type f -exec cp -v {} release/ \;
          fi
          cd release
          ls -lh

      - name: Move dev-latest tag to this commit
        run: |
          git tag -f dev-latest "$GITHUB_SHA"
          git push -f origin dev-latest

      - name: Publish GitHub prerelease (dev-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: dev-latest
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Mutable DEV build for `${{ github.sha }}` (`$(cat VERSION)-dev.${{ github.sha }}`).

            - CLI defaults to `https://dev-api.kortix.com`.
            - Desktop defaults to `https://dev.kortix.com/dashboard`.
          files: |
            release/*

name: Promote Dev to Staging

# Moves the pre-prod branch to a known dev commit. This keeps the normal path
# simple: push/merge to main -> dev deploy -> promote that exact commit to
# staging -> staging build/QA -> promote staging to production.
#
# Teams can still open direct PRs into `staging` for a staging-only release
# candidate; build-staging.yml will create exact staging images for that SHA.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Dev ref to promote to staging"
        required: false
        default: main
        type: string

concurrency:
  group: promote-staging
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  promote:
    name: Move staging to dev ref
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Push exact commit to staging
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          git fetch origin staging --quiet || true
          echo "Promoting ${{ inputs.ref }} @ $sha to staging"
          git push origin "$sha:refs/heads/staging"
          echo "staging now points at $sha"


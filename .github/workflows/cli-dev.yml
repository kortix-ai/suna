name: CLI dev release

# Publishes a mutable dev CLI build from main. Install with:
#   curl -fsSL https://kortix.com/install | KORTIX_CHANNEL=dev bash

on:
  push:
    branches: [main]
    paths:
      - 'apps/cli/**'
      - 'packages/starter/**'
      - 'scripts/install.sh'
      - 'bun.lock'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cli-dev-release
  cancel-in-progress: true

env:
  CLI_TAG: cli-dev-latest
  CLI_API_BASE: https://dev-api.kortix.com

jobs:
  build:
    name: Build ${{ matrix.target_pretty }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            target_pretty: darwin-arm64
            asset: kortix-darwin-arm64
            runner: macos-14
          - target: bun-darwin-x64
            target_pretty: darwin-x64
            asset: kortix-darwin-x64
            runner: macos-13
          - target: bun-linux-x64
            target_pretty: linux-x64
            asset: kortix-linux-x64
            runner: ubuntu-22.04
          - target: bun-linux-arm64
            target_pretty: linux-arm64
            asset: kortix-linux-arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: |
          CLI_VERSION="dev-${GITHUB_SHA::8}"
          bun build \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --define="process.env.KORTIX_CLI_VERSION=\"${CLI_VERSION}\"" \
            --define="process.env.KORTIX_DEFAULT_API_BASE=\"${{ env.CLI_API_BASE }}\"" \
            --outfile=${{ matrix.asset }} \
            apps/cli/src/index.ts
          ls -lh ${{ matrix.asset }}

      - name: Smoke test (--version)
        if: matrix.target_pretty == 'darwin-arm64' || matrix.target_pretty == 'linux-x64'
        run: ./${{ matrix.asset }} version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish dev CLI release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd artifacts
          ls -lh
          sha256sum kortix-* > SHA256SUMS

      - name: Move dev tag
        run: |
          git tag -f "${{ env.CLI_TAG }}" "$GITHUB_SHA"
          git push -f origin "${{ env.CLI_TAG }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.CLI_TAG }}
          name: ${{ env.CLI_TAG }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          generate_release_notes: false
          body: |
            Mutable dev build for `${{ github.sha }}`.

            Defaults to `${{ env.CLI_API_BASE }}`.
          files: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
            artifacts/SHA256SUMS

name: Deploy Prod

# PROD pipeline. Runs when `prod` advances — i.e. when a reviewed promote PR is
# MERGED (promote.yml opens it) — or on manual dispatch. This is the ONLY place
# a version is published: the tag `vX.Y.Z`, the GitHub Release, the image retag,
# the EKS deploy, and the frontend all happen here, never before the prod merge.
# The root VERSION on `prod` is the clean version `X.Y.Z`.
#
#   1. Retag the promoted staging images (kortix/kortix-*:staging-<sha8>)
#      → :X.Y.Z + :latest (multi-arch manifest copy, zero rebuilds). The
#      self-host `:stable` channel is promoted SEPARATELY and manually via
#      promote-self-host-stable.yml — a prod release is not auto-shipped to self-hosts.
#   2. Build the prod CLI (4 targets, default api.kortix.com) + prod desktop
#      installers and cut a single GitHub Release `vX.Y.Z`.
#   3. EKS deploy: the promote PR merge already bumped infra/k8s/envs/prod, so
#      Argo CD rolls the prod Deployment — this job WATCHES it reach vX.Y.Z and
#      announces to Slack.
#   4. Deploy the prod frontend on Vercel (the `prod` branch → kortix.com).
#
# The prod stack is api.kortix.com → EKS + kortix.com (Vercel). api.kortix.com is
# a Cloudflare Worker (infra/cloudflare/workers/api-router) routing to api-eks.
# EKS rolls via Argo CD GitOps.

on:
  push:
    branches: [prod]
  workflow_dispatch:
  # Promotion is review-gated: promote.yml opens a PR into `prod`, and a human
  # MERGES it after approval. That merge is a real `push` to `prod` (above) and
  # triggers this pipeline normally — so no workflow_run hook is needed (and we
  # must NOT deploy merely because Promote *opened* the PR).

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Resolve the version from VERSION ────────────────────────────────────────
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    # Runs on every push to `prod` (i.e. a merged, reviewed release PR) and on
    # manual dispatch.
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      title: ${{ steps.v.outputs.title }}
      notes: ${{ steps.v.outputs.notes }}
      source_sha: ${{ steps.v.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full tags + annotations to read the release notes
      - name: Read VERSION + release notes (committed by the promote PR)
        id: v
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < VERSION)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Publishing v$V"

          # promote.yml committed RELEASE_NOTES.md (line 1 = title, rest = notes)
          # onto the release branch; it merged into prod with this release. The
          # tag does NOT exist yet — the GitHub Release job creates it at this
          # prod commit. (Nothing was published before this merge.)
          if [ -f RELEASE_NOTES.md ]; then
            echo "title=$(head -n1 RELEASE_NOTES.md)" >> "$GITHUB_OUTPUT"
            {
              echo 'notes<<KORTIX_NOTES_EOF'
              tail -n +3 RELEASE_NOTES.md
              echo 'KORTIX_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "title=" >> "$GITHUB_OUTPUT"
            { echo 'notes<<KORTIX_NOTES_EOF'; echo 'KORTIX_NOTES_EOF'; } >> "$GITHUB_OUTPUT"
          fi

          # The exact source commit this release was cut from (stamped by
          # promote.yml). Empty for legacy releases that predate SHA stamping.
          if [ -f RELEASE_SOURCE_SHA ]; then
            SRC="$(tr -d '[:space:]' < RELEASE_SOURCE_SHA)"
            echo "source_sha=$SRC" >> "$GITHUB_OUTPUT"
            echo "Release source commit: $SRC"
          else
            echo "source_sha=" >> "$GITHUB_OUTPUT"
            echo "No RELEASE_SOURCE_SHA (legacy release) — will use legacy dev fallback images"
          fi

  # ── Raise the "release in progress" banner ──────────────────────────────────
  # Show users a CRITICAL banner for the duration of the rollout (non-dismissible
  # for members; admins can still dismiss). Best-effort and non-blocking: it never
  # gates or fails the deploy, and it
  # never clobbers an active incident banner (see scripts/ci-maintenance-banner.sh).
  # Cleared again by `maintenance-banner-off`, but ONLY once the rollout is green.
  # Requires the PROD_MAINTENANCE_TOKEN secret (a platform-admin bearer); if it
  # is unset the job is a no-op, so the release still works before it is added.
  maintenance-banner-on:
    name: Rollout banner (raise)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect maintenance token
        id: cfg
        env:
          TOKEN: ${{ secrets.PROD_MAINTENANCE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::PROD_MAINTENANCE_TOKEN not set — skipping rollout banner."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Raise rollout banner
        if: steps.cfg.outputs.enabled == 'true'
        continue-on-error: true
        env:
          MAINTENANCE_TOKEN: ${{ secrets.PROD_MAINTENANCE_TOKEN }}
        run: bash scripts/ci-maintenance-banner.sh on "v${{ needs.version.outputs.version }}"

  # ── Retag staged images → versioned + latest (no rebuild) ───────────────────
  retag-images:
    name: Re-tag staged → v${{ needs.version.outputs.version }}
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Re-tag release images
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SOURCE_SHA: ${{ needs.version.outputs.source_sha }}
        run: |
          set -euo pipefail
          # Prefer the image built from the EXACT promoted staging commit
          # (staging-<sha8>). This covers both paths into staging:
          #   1. main -> staging PR, where staging contains the full dev candidate.
          #   2. targeted branch -> staging PR, where the SHA may never exist on main.
          # For legacy/manual releases, fall back to dev-<sha8>, then dev-latest.
          for IMAGE in kortix/kortix-api kortix/kortix-gateway kortix/kortix-frontend; do
            STAGING_TAG=""
            DEV_TAG=""
            if [ -n "${SOURCE_SHA:-}" ]; then
              STAGING_TAG="staging-${SOURCE_SHA:0:8}"
              DEV_TAG="dev-${SOURCE_SHA:0:8}"
            fi
            if [ -n "$STAGING_TAG" ] && docker buildx imagetools inspect "$IMAGE:$STAGING_TAG" >/dev/null 2>&1; then
              SRC_TAG="$STAGING_TAG"
            elif [ -n "$DEV_TAG" ] && docker buildx imagetools inspect "$IMAGE:$DEV_TAG" >/dev/null 2>&1; then
              SRC_TAG="$DEV_TAG"
            elif docker buildx imagetools inspect "$IMAGE:dev-latest" >/dev/null 2>&1; then
              SRC_TAG="dev-latest"
              echo "::notice::$IMAGE has no ${STAGING_TAG:-staging-<sha8>} or ${DEV_TAG:-dev-<sha8>} — using :dev-latest."
            else
              echo "::error::$IMAGE: no staging/dev image is published for this release source."
              exit 1
            fi
            # A prod release publishes :X.Y.Z + :latest only. The self-host
            # `:stable` channel — the tag self-hosted boxes auto-update to — is
            # CURATED, not automatic: a human promotes a proven version to
            # :stable via the "Promote Self-Host Stable" workflow (promote-self-host-stable.yml).
            # Released != auto-shipped to every self-hosted customer overnight.
            echo "Re-tagging $IMAGE:$SRC_TAG → $IMAGE:${VERSION} + :latest"
            docker buildx imagetools create \
              --tag "$IMAGE:${VERSION}" \
              --tag "$IMAGE:latest" \
              "$IMAGE:$SRC_TAG"
            echo "✓ $IMAGE:${VERSION} (from $SRC_TAG)"
          done
      - name: Summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          {
            echo "### Re-tagged staged images → v${VERSION}"
            echo "- \`kortix/kortix-api:${VERSION}\` (multi-arch)"
            echo "- \`kortix/kortix-frontend:${VERSION}\` (multi-arch)"
            echo ""
            echo "_Zero rebuilds — re-tagged from the promoted staging manifests._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build prod CLI (4 targets on one Linux runner via Bun cross-compile) ────
  build-cli:
    name: Build prod CLI (all targets)
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps (pnpm)
        # The repo's lockfile is pnpm format; `bun install` cannot migrate it
        # ("PnpmLockfileTooOld"), so install deps with pnpm and compile with bun.
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build every target (Bun cross-compile)
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          API_BASE="https://api.kortix.com"
          mkdir -p artifacts
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "↻ building kortix-$t (cli $VERSION)"
            bun build \
              --compile \
              --minify \
              --target="bun-$t" \
              --define="process.env.KORTIX_CLI_VERSION=\"${VERSION}\"" \
              --define="process.env.KORTIX_DEFAULT_API_BASE=\"${API_BASE}\"" \
              --outfile="artifacts/kortix-$t" \
              apps/cli/src/index.ts
          done
          cd artifacts
          chmod +x kortix-*
          ls -lh

      - name: Smoke test (native linux-x64)
        run: ./artifacts/kortix-linux-x64 version

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
          if-no-files-found: error

  # ── Publish the public SDKs to npm ──────────────────────────────────────────
  # Three packages ship to npm on every version release, in lockstep with the
  # platform version:
  #   @kortix/llm-catalog   — the model catalog (models + managed-model defaults)
  #                           the frontend SDK consumes
  #   @kortix/sdk           — the frontend data-layer SDK; depends on
  #                           @kortix/llm-catalog@<version>, pinned in lockstep
  #   @kortix/executor-sdk  — the programmatic face of the Executor (alongside the
  #                           `kortix executor` CLI + `kortix executor mcp` server)
  #
  # Each package declares its published (dist-pointing) layout in its own
  # publishConfig. scripts/publish-npm-package.sh builds it, stages that manifest
  # (scripts/stage-npm-publish.mjs: promote publishConfig, pin workspace deps to
  # the release version, verify every entrypoint exists in dist/) and publishes
  # idempotently.
  #
  # Auth is Trusted Publishing (OIDC) when the job grants id-token, else the
  # NPM_TOKEN secret (an npm automation token with publish rights on the @kortix
  # org). With neither, the publish step skips cleanly so a release is never
  # blocked. Once Trusted Publishing is verified per package on npmjs.com (package
  # → Settings → Trusted Publisher → this repo + this workflow), the NPM_TOKEN
  # secret and the NODE_AUTH_TOKEN env line below can be removed — OIDC needs no
  # stored secret.

  # @kortix/llm-catalog publishes first, on its own, so @kortix/sdk's pinned
  # @kortix/llm-catalog@<version> dependency is already on the registry before the
  # SDK (and, harmlessly, the Executor SDK) publishes.
  publish-llm-catalog:
    name: Publish @kortix/llm-catalog to npm
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps (pnpm)
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build + publish (Trusted Publishing via OIDC; token fallback)
        working-directory: packages/llm-catalog
        env:
          VERSION: ${{ needs.version.outputs.version }}
          # Fallback only. Once Trusted Publishing is verified, delete the
          # NPM_TOKEN secret AND this line — OIDC needs no stored secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash ../../scripts/publish-npm-package.sh

  publish-sdk:
    name: Publish ${{ matrix.pkg }} to npm
    needs: [version, publish-llm-catalog]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # @kortix/sdk needs publish-llm-catalog (above) done first so its pinned
          # @kortix/llm-catalog@<version> dependency already resolves on npm.
          - pkg: '@kortix/sdk'
            dir: sdk
          - pkg: '@kortix/executor-sdk'
            dir: executor-sdk
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps (pnpm)
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build + publish (Trusted Publishing via OIDC; token fallback)
        working-directory: packages/${{ matrix.dir }}
        env:
          VERSION: ${{ needs.version.outputs.version }}
          # Fallback only. Once Trusted Publishing is verified, delete the
          # NPM_TOKEN secret AND this line — OIDC needs no stored secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash ../../scripts/publish-npm-package.sh

  # ── Build prod desktop installers (Electron, signed) ────────────────────────
  build-desktop:
    name: Build prod desktop ${{ matrix.target_pretty }}
    needs: version
    runs-on: ${{ matrix.runner }}
    env:
      DESKTOP_URL: https://kortix.com/projects
    strategy:
      fail-fast: false
      matrix:
        include:
          # `files` lists the user-facing installer AND the auto-update metadata
          # electron-updater reads (latest*.yml + blockmaps, plus the mac update
          # zip). Without the yml/zip attached to the release the in-app updater
          # has nothing to fetch.
          # macOS universal (Apple Silicon + Intel) in one signed/notarized .dmg.
          - target_pretty: macos
            runner: macos-14
            eb_flag: --mac
            artifact: desktop-macos
            files: |
              apps/desktop-electron/dist/*.dmg
              apps/desktop-electron/dist/*.zip
              apps/desktop-electron/dist/*.blockmap
              apps/desktop-electron/dist/latest-mac.yml
          - target_pretty: windows-x64
            runner: windows-2022
            eb_flag: --win
            artifact: desktop-windows-x64
            files: |
              apps/desktop-electron/dist/*.exe
              apps/desktop-electron/dist/*.blockmap
              apps/desktop-electron/dist/latest.yml
          - target_pretty: linux-x64
            runner: ubuntu-22.04
            eb_flag: --linux
            artifact: desktop-linux-x64
            files: |
              apps/desktop-electron/dist/*.AppImage
              apps/desktop-electron/dist/latest-linux.yml
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @kortix/desktop-electron
        env:
          npm_config_engine_strict: "false"

      # Never hard-fail on missing certs — a release should always ship an
      # installer. Sign (+ notarize on macOS) when the platform's secrets are
      # present; otherwise build UNSIGNED (Gatekeeper/SmartScreen warning).
      - name: Decide signing
        id: sign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          enabled=false
          case "${{ runner.os }}" in
            macOS)   [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && enabled=true ;;
            Windows) [ -n "$WINDOWS_CERTIFICATE" ] && [ -n "$WINDOWS_CERTIFICATE_PASSWORD" ] && enabled=true ;;
            *)       enabled=true ;;
          esac
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          [ "$enabled" = true ] && echo "::notice::${{ runner.os }} signing ENABLED." \
                                || echo "::warning::${{ runner.os }} signing secrets absent — building UNSIGNED."

      - name: Prepare macOS notarization key
        if: runner.os == 'macOS' && steps.sign.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_P8" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
            echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Ensure Electron runtime
        run: pnpm --filter @kortix/desktop-electron exec node scripts/ensure-runtime.js

      # electron-builder signs (+ notarizes on macOS) when CSC_*/APPLE_API_*
      # are present; empty → unsigned. Version + prod URL are baked in here.
      - name: Build desktop installer (Electron)
        shell: bash
        run: |
          pnpm --filter @kortix/desktop-electron exec electron-builder ${{ matrix.eb_flag }} \
            --publish never \
            --config.extraMetadata.version="${{ needs.version.outputs.version }}" \
            --config.extraMetadata.kortixDefaultUrl="$DESKTOP_URL" \
            --config.extraMetadata.kortixUpdateChannel="stable"
        env:
          CSC_LINK: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          CSC_KEY_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_API_KEY_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_ISSUER: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_API_ISSUER || '' }}
          # Apple-ID notarization fallback — electron-builder uses whichever set
          # is populated (API key above OR Apple-ID here).
          APPLE_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && (secrets.APPLE_APP_SPECIFIC_PASSWORD || secrets.APPLE_PASSWORD) || '' }}
          APPLE_TEAM_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_TEAM_ID || '' }}
          WIN_CSC_LINK: ${{ steps.sign.outputs.enabled == 'true' && secrets.WINDOWS_CERTIFICATE || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && secrets.WINDOWS_CERTIFICATE_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.sign.outputs.enabled }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  # ── Cut a single GitHub Release vX.Y.Z (CLI + desktop) ──────────────────────
  # Cut the release as soon as the CLI + images are ready — it does NOT wait on
  # desktop. Desktop builds on slow, scarce, signed macOS/Windows runners that
  # can get stuck queued for ~50min (or fail on a cert problem); waiting on them
  # would block every release. Desktop installers are attached afterward by the
  # separate `attach-desktop` job, best-effort. So a desktop problem can never
  # delay or block the API/frontend/CLI release.
  github-release:
    name: GitHub Release v${{ needs.version.outputs.version }}
    needs: [version, retag-images, build-cli]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: artifacts/

      - name: Assemble release assets + checksums
        run: |
          set -euo pipefail
          mkdir -p release
          cp -v artifacts/kortix-* release/
          cd release
          sha256sum * > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          # Human title + notes from the tag annotation (set at promote time) lead
          # the release; the auto-generated PR list is appended below them.
          name: ${{ needs.version.outputs.title != '' && format('{0} — {1}', needs.version.outputs.tag, needs.version.outputs.title) || needs.version.outputs.tag }}
          body: ${{ needs.version.outputs.notes }}
          generate_release_notes: true
          files: |
            release/*

  # ── Attach desktop installers to the release (best-effort, non-blocking) ─────
  # Runs after the release is already cut. Uploads whatever desktop installers
  # built; if desktop failed entirely it's a no-op and the release simply ships
  # without installers (re-run desktop + this job later to add them).
  attach-desktop:
    name: Attach desktop installers
    needs: [version, github-release, build-desktop]
    if: always() && needs.github-release.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: desktop-artifacts/
          pattern: desktop-*
          merge-multiple: true

      - name: Upload installers to the release (if any built)
        run: |
          set -euo pipefail
          if [ ! -d desktop-artifacts ] || [ -z "$(ls -A desktop-artifacts 2>/dev/null)" ]; then
            echo "::warning::No desktop installers built — release ships CLI + images only."
            exit 0
          fi
          cd desktop-artifacts
          sha256sum * > DESKTOP-SHA256SUMS
          gh release upload "${{ needs.version.outputs.tag }}" * --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Apply DB migrations to prod BEFORE the API rolls ────────────────────────
  # Closes the gap that caused the 2026-06-21 /triggers 500: migrations used to be
  # applied by a manual step at promote that got missed, so new code shipped
  # against a DB missing its columns. This job applies supabase/migrations
  # (tracked in kortix.schema_migrations, idempotent, halts on real failure) and
  # deploy-api `needs:` it — so the schema is ALWAYS current before new code
  # serves. Migrations are additive + reviewed; the runner never runs the
  # dangerous `drizzle-kit push --force` (which is why prod's ensureSchema stays a
  # no-op). See scripts/apply-migrations.sh.
  migrate-db:
    name: Apply DB migrations to prod
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile --filter "@kortix/db..." --filter "kortix"
        env:
          npm_config_engine_strict: "false"
      - name: Apply pending migrations (node-pg-migrate; halts on failure)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::PROD_DATABASE_URL secret is not set — refusing to deploy without a migration check."
            exit 1
          fi
          pnpm --filter @kortix/db migrate

  # ── Verify prod actually matches the migrations (live-schema presence gate) ──
  # migrate-db proves the migrations RAN; this proves they TOOK. A faked baseline
  # (migrate.ts autoBaselineIfNeeded marks-applied-without-running on a pre-existing
  # schema) can leave holes the migration step never notices — exactly how
  # project_session_public_shares went missing on prod until a user hit a 500.
  # Builds the canonical schema fresh from the committed migrations in a sidecar
  # Postgres, then asserts prod contains every table+column it defines. Presence-
  # only (canonical ⊆ live): tolerant of prod's legacy/cosmetic differences,
  # strict about missing objects. deploy-api gates on this — drift blocks the roll.
  verify-schema:
    name: Verify prod schema matches migrations
    # TEMPORARILY DISABLED. Prod is broadly diverged from the migration baseline
    # (e.g. execution_status / sandbox_provider enum values the canonical schema
    # defines but prod lacks). Reconciling that is a separate, deliberate effort;
    # until then this presence check blocks every prod roll. Re-enable by flipping
    # `if` back to the default and restoring `verify-schema` in deploy-api.needs.
    if: false
    needs: migrate-db
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CANONICAL_DB_URL: postgres://postgres:postgres@localhost:5432/postgres
      LIVE_DB_URL: ${{ secrets.PROD_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: corepack enable pnpm
      - run: pnpm install --frozen-lockfile --filter "@kortix/db..." --filter "kortix"
        env:
          npm_config_engine_strict: "false"
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Build canonical schema from migrations (sidecar)
        env:
          DATABASE_URL: ${{ env.CANONICAL_DB_URL }}
        run: |
          psql "$CANONICAL_DB_URL" -v ON_ERROR_STOP=1 -f packages/db/scripts/test-prereqs.sql
          pnpm --filter @kortix/db migrate
      - name: Assert prod contains every table+column the migrations define
        run: |
          set -euo pipefail
          if [ -z "${LIVE_DB_URL:-}" ]; then
            echo "::error::PROD_DATABASE_URL secret is not set — cannot verify prod schema."
            exit 1
          fi
          bun packages/db/scripts/verify-live-schema.ts

  # ── Deploy API to prod (EKS / Argo CD GitOps) ───────────────────────────────
  # The promote PR merge already bumped infra/k8s/envs/prod/values.yaml (image tag
  # + kortixVersion), so Argo CD on the prod-eks cluster rolls the Deployment.
  # This job WATCHES that roll finish on exactly :VERSION, then announces to Slack.
  # kortixVersion comes from the values bump, so /v1/health reports the clean
  # X.Y.Z — no task-def version stamping like the old ECS roll needed.
  # Roll prod ECS Fargate (api + gateway) to the release image, keeping it current
  # alongside EKS. The script skips gracefully until the prod ECS gateway infra
  # exists, and keeps each service's task-def current WITHOUT changing its desired
  # count — so prod ECS stays a scaled-to-zero standby (no extra cost) until the
  # gated prod traffic flip deliberately scales it up. Deploy ≠ flip.
  deploy-ecs:
    name: Deploy API + gateway to prod (ECS Fargate)
    needs: [version, retag-images, migrate-db]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC → ECS deploy role
      contents: read
    env:
      AWS_REGION: eu-west-2
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-ecs-deploy
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Roll prod ECS (api + gateway) from the prod-env blob
        run: |
          bash infra/scripts/ecs-deploy.sh prod "kortix/kortix-api:${VERSION}"
          bash infra/scripts/ecs-deploy.sh prod "kortix/kortix-gateway:${VERSION}" --service gateway

  deploy-api:
    name: Deploy API to prod (EKS / GitOps)
    needs: [version, retag-images, migrate-db]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC → read the cluster
      contents: read
    env:
      AWS_REGION: eu-west-2
      CLUSTER: kortix-prod-eks
      NAMESPACE: kortix-prod
      APP: kortix-api
      ARGO_APP: kortix-prod
      API_HOST: api-eks.kortix.com
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-eks-deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — cluster exists
        id: guard
        run: |
          if aws eks describe-cluster --name "$CLUSTER" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::EKS cluster not found — skipping (not applied yet)."
          fi

      - name: Update kubeconfig
        if: steps.guard.outputs.exists == 'true'
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      # Self-heal: a forward release OWNS prod, so the Argo app must track the
      # `prod` branch. A break-glass rollback can repoint its targetRevision at a
      # one-off `rollback/*` branch to deploy without merging to prod; if never
      # pointed back, EVERY later release silently stalls in the rollout wait below
      # (Argo keeps syncing the rollback branch, so the image never reaches
      # :VERSION). Assert `prod` and repoint if drifted. Best-effort: never fail the
      # deploy on this (the wait is the backstop). See docs/runbooks + kortix-rollback.
      - name: Ensure Argo app tracks 'prod' (recover a stranded rollback repoint)
        if: steps.guard.outputs.exists == 'true'
        continue-on-error: true
        run: |
          set -uo pipefail
          cur="$(kubectl -n argocd get application "$ARGO_APP" -o json 2>/dev/null \
            | jq -r '[(.spec.sources // [.spec.source])[].targetRevision] | map(select(.!=null)) | unique | join(",")')"
          if [ -z "$cur" ]; then
            echo "::warning::Could not read Argo app $ARGO_APP — skipping self-heal; the rollout wait is the backstop."; exit 0
          fi
          if [ "$cur" = "prod" ]; then echo "✓ Argo app $ARGO_APP tracks 'prod'."; exit 0; fi
          echo "::warning::Argo app $ARGO_APP was tracking '$cur' (not 'prod') — repointing to 'prod' (stranded-rollback recovery)."
          n="$(kubectl -n argocd get application "$ARGO_APP" -o json | jq '(.spec.sources // []) | length')"
          if [ "$n" -gt 0 ]; then
            for i in $(seq 0 $((n-1))); do
              kubectl -n argocd patch application "$ARGO_APP" --type json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/sources/$i/targetRevision\",\"value\":\"prod\"}]"
            done
          else
            kubectl -n argocd patch application "$ARGO_APP" --type merge \
              -p '{"spec":{"source":{"targetRevision":"prod"}}}'
          fi
          kubectl -n argocd annotate application "$ARGO_APP" argocd.argoproj.io/refresh=hard --overwrite || true

      # Wait for Argo CD to reconcile the promote bump and the Deployment to finish
      # rolling out exactly :VERSION — Argo applied the new spec (observedGeneration
      # caught up) AND every replica is updated + available. A release whose pods
      # never go Ready never satisfies this, so the success message never fires.
      - name: Wait for Deployment rolled out @ v${{ needs.version.outputs.version }}
        if: steps.guard.outputs.exists == 'true'
        id: wait
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -uo pipefail
          for i in $(seq 1 80); do
            img="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            gen="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.metadata.generation}' 2>/dev/null || true)"
            obs="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.observedGeneration}' 2>/dev/null || true)"
            desired="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.replicas}' 2>/dev/null || true)"
            updated="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || true)"
            avail="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)"
            echo "($i/80) image=${img:-?} gen=${obs:-?}/${gen:-?} updated=${updated:-0}/${desired:-?} available=${avail:-0}"
            if printf '%s' "$img" | grep -q ":${VERSION}$" \
               && [ -n "$desired" ] && [ "${obs:-0}" -ge "${gen:-1}" ] \
               && [ "${updated:-0}" = "$desired" ] && [ "${avail:-0}" = "$desired" ]; then
              echo "deployed=true" >> "$GITHUB_OUTPUT"
              echo "✓ EKS Deployment rolled out on :${VERSION} (${avail}/${desired} ready)"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Deployment did not roll out to :${VERSION} within ~20m (stuck or pods never became Ready). No release announcement sent."
          exit 1

      # Source the truth from the running service (the commit field we bake in).
      - name: Read live /v1/health
        if: steps.guard.outputs.exists == 'true' && steps.wait.outputs.deployed == 'true'
        id: health
        run: |
          set -uo pipefail
          h="$(curl -s --max-time 10 "https://${API_HOST}/v1/health" || true)"
          echo "commit=$(printf '%s' "$h" | jq -r '.commit // ""' 2>/dev/null)" >> "$GITHUB_OUTPUT"

      - name: Announce to Slack
        if: steps.guard.outputs.exists == 'true' && steps.wait.outputs.deployed == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_RELEASE_CHANNEL: ${{ secrets.SLACK_RELEASE_CHANNEL }}
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
          TITLE: ${{ needs.version.outputs.title }}
          NOTES: ${{ needs.version.outputs.notes }}
          META_SHA: ${{ needs.version.outputs.source_sha }}
          LIVE_COMMIT: ${{ steps.health.outputs.commit }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${SLACK_BOT_TOKEN:-}" ] || [ -z "${SLACK_RELEASE_CHANNEL:-}" ]; then
            echo "::notice::SLACK_BOT_TOKEN / SLACK_RELEASE_CHANNEL not set — skipping Slack."
            exit 0
          fi

          # Prefer the commit actually serving (/v1/health); fall back to the
          # promoted source SHA. Truncate notes to a Slack-safe length.
          SHA="${LIVE_COMMIT:-$META_SHA}"
          SHA8="${SHA:0:8}"
          [ -n "$SHA8" ] || SHA8="unknown"
          NOTES="$(printf '%s' "${NOTES:-}" | head -c 1200)"
          REL_URL="${SERVER}/${REPO}/releases/tag/${TAG}"
          COMMIT_URL="${SERVER}/${REPO}/commit/${SHA}"

          payload="$(jq -n \
            --arg channel "$SLACK_RELEASE_CHANNEL" \
            --arg header "🚀 Kortix ${TAG} is live (EKS)" \
            --arg title "${TITLE:-Release $TAG}" \
            --arg notes "${NOTES:-}" \
            --arg version "$VERSION" \
            --arg sha8 "$SHA8" \
            --arg commit_url "$COMMIT_URL" \
            --arg actor "$ACTOR" \
            --arg rel_url "$REL_URL" \
            --arg run_url "$RUN_URL" \
            '{
              channel: $channel,
              text: $header,
              blocks: [
                { type:"header", text:{ type:"plain_text", text:$header, emoji:true } },
                ( { type:"section", text:{ type:"mrkdwn",
                    text: ("*" + $title + "*" + (if $notes == "" then "" else ("\n" + $notes) end)) } } ),
                { type:"section", fields: [
                  { type:"mrkdwn", text: ("*Version*\n`" + $version + "`") },
                  { type:"mrkdwn", text: ("*Commit*\n<" + $commit_url + "|`" + $sha8 + "`>") },
                  { type:"mrkdwn", text: ("*Released by*\n" + $actor) },
                  { type:"mrkdwn", text: "*Where*\nEKS (Argo CD) · CLI · Desktop · Web" }
                ]},
                { type:"actions", elements: [
                  { type:"button", text:{ type:"plain_text", text:"📦 Release notes", emoji:true }, url:$rel_url },
                  { type:"button", text:{ type:"plain_text", text:"🚢 Argo CD", emoji:true }, url:"https://ops.kortix.com" },
                  { type:"button", text:{ type:"plain_text", text:"🔧 Pipeline", emoji:true }, url:$run_url }
                ]}
              ]
            }')"

          for attempt in 1 2 3 4 5; do
            resp="$(curl -sS --max-time 30 \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-type: application/json; charset=utf-8" \
              --data "$payload" \
              https://slack.com/api/chat.postMessage || true)"
            ok="$(printf '%s' "$resp" | jq -r '.ok // false' 2>/dev/null || echo false)"
            if [ "$ok" = "true" ]; then
              echo "✓ Slack notified (${SLACK_RELEASE_CHANNEL})"; exit 0
            fi
            err="$(printf '%s' "$resp" | jq -r '.error // "no_response"' 2>/dev/null || echo no_response)"
            echo "::warning::Slack attempt ${attempt}/5 failed: ${err}"
            case "$err" in
              invalid_auth|not_authed|account_inactive|token_revoked|channel_not_found|not_in_channel|is_archived|missing_scope)
                echo "::error::Slack permanent error '${err}'. Check SLACK_BOT_TOKEN (xoxb + chat:write), SLACK_RELEASE_CHANNEL (channel ID), and that the bot is invited to the channel."
                exit 1 ;;
            esac
            sleep $((attempt * 3))
          done
          echo "::error::Slack failed after 5 attempts (last: ${err})."; exit 1

  # ── Deploy gateway to prod (EKS / Argo CD GitOps) ───────────────────────────
  # The promote PR merge bumped infra/k8s/envs/prod/gateway-values.yaml image.tag,
  # so Argo CD on prod-eks rolls the kortix-gateway Deployment. This job WATCHES
  # that roll finish on exactly :VERSION. Soft (continue-on-error) — a not-yet-
  # applied gateway app or ingress/cert lag never blocks the rest of the release.
  deploy-gateway:
    name: Deploy gateway to prod (EKS / GitOps)
    needs: [version, retag-images]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: eu-west-2
      CLUSTER: kortix-prod-eks
      NAMESPACE: kortix-prod
      APP: kortix-gateway
      ARGO_APP: kortix-gateway-prod
      ROLE: arn:aws:iam::935064898258:role/kortix-gha-eks-deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Guard — cluster exists
        id: guard
        run: |
          if aws eks describe-cluster --name "$CLUSTER" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::EKS cluster not found — skipping (not applied yet)."
          fi

      - name: Update kubeconfig
        if: steps.guard.outputs.exists == 'true'
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      # Self-heal: assert the Argo app tracks `prod` and repoint if a break-glass
      # rollback left it on a `rollback/*` branch (else the rollout wait stalls
      # forever). Best-effort; the wait is the backstop. See the API job + kortix-rollback.
      - name: Ensure Argo app tracks 'prod' (recover a stranded rollback repoint)
        if: steps.guard.outputs.exists == 'true'
        continue-on-error: true
        run: |
          set -uo pipefail
          cur="$(kubectl -n argocd get application "$ARGO_APP" -o json 2>/dev/null \
            | jq -r '[(.spec.sources // [.spec.source])[].targetRevision] | map(select(.!=null)) | unique | join(",")')"
          if [ -z "$cur" ]; then
            echo "::warning::Could not read Argo app $ARGO_APP — skipping self-heal; the rollout wait is the backstop."; exit 0
          fi
          if [ "$cur" = "prod" ]; then echo "✓ Argo app $ARGO_APP tracks 'prod'."; exit 0; fi
          echo "::warning::Argo app $ARGO_APP was tracking '$cur' (not 'prod') — repointing to 'prod' (stranded-rollback recovery)."
          n="$(kubectl -n argocd get application "$ARGO_APP" -o json | jq '(.spec.sources // []) | length')"
          if [ "$n" -gt 0 ]; then
            for i in $(seq 0 $((n-1))); do
              kubectl -n argocd patch application "$ARGO_APP" --type json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/sources/$i/targetRevision\",\"value\":\"prod\"}]"
            done
          else
            kubectl -n argocd patch application "$ARGO_APP" --type merge \
              -p '{"spec":{"source":{"targetRevision":"prod"}}}'
          fi
          kubectl -n argocd annotate application "$ARGO_APP" argocd.argoproj.io/refresh=hard --overwrite || true

      # Code is the first-class copy: re-apply the committed Argo CD Application so
      # the live app always tracks what the repo says (path / targetRevision /
      # values). Without this, a hand-applied app that drifted (e.g. left tracking
      # an old branch) silently freezes the gateway on a stale image while Argo
      # reports Synced/Healthy — exactly the "not yet tracking the prod values"
      # case the watch warns about below. Best-effort on RBAC; never blocks.
      - name: Reconcile Argo CD Application from repo (code is source of truth)
        if: steps.guard.outputs.exists == 'true'
        continue-on-error: true
        run: |
          kubectl apply -f infra/k8s/argocd/applications/gateway-prod.yaml \
            || echo "::warning::could not apply gateway-prod Application (argocd RBAC for the deploy role?) — live app may be drifted from the repo"
          kubectl -n argocd annotate application kortix-gateway-prod \
            argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true

      - name: Wait for gateway Deployment rolled out @ v${{ needs.version.outputs.version }}
        if: steps.guard.outputs.exists == 'true'
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -uo pipefail
          for i in $(seq 1 80); do
            img="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            gen="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.metadata.generation}' 2>/dev/null || true)"
            obs="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.observedGeneration}' 2>/dev/null || true)"
            desired="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.spec.replicas}' 2>/dev/null || true)"
            updated="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.updatedReplicas}' 2>/dev/null || true)"
            avail="$(kubectl -n "$NAMESPACE" get deploy "$APP" -o jsonpath='{.status.availableReplicas}' 2>/dev/null || true)"
            echo "($i/80) image=${img:-?} gen=${obs:-?}/${gen:-?} updated=${updated:-0}/${desired:-?} available=${avail:-0}"
            if printf '%s' "$img" | grep -q ":${VERSION}$" \
               && [ -n "$desired" ] && [ "${obs:-0}" -ge "${gen:-1}" ] \
               && [ "${updated:-0}" = "$desired" ] && [ "${avail:-0}" = "$desired" ]; then
              echo "✓ EKS gateway rolled out on :${VERSION} (${avail}/${desired} ready)"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::gateway did not roll out to :${VERSION} within ~20m (Argo lag, or kortix-gateway-prod not yet tracking the prod values)."

  # ── Prod frontend (Vercel) ──────────────────────────────────────────────────
  # No job here: the Vercel project is git-connected and auto-deploys the `prod`
  # branch on every push (→ kortix.com) — the same way dev.kortix.com
  # auto-deploys from `main`. The promote workflow's push to `prod` triggers it.
  frontend-note:
    name: Prod frontend (Vercel auto-deploys prod)
    needs: version  # gate with the rest of the pipeline (skipped on a failed promote)
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          {
            echo "### Frontend → **prod** (Vercel)"
            echo "Vercel auto-deploys the \`prod\` branch (→ kortix.com). No action needed here."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Keep main's VERSION honest (post-publish, never premature) ──────────────
  # promote.yml does NOT bump main's VERSION (publishing is gated on the prod
  # merge). After a release publishes, advance main's VERSION to the NEXT dev
  # target (released patch + 1) so the single source of truth tracks prod: this
  # is what the Vercel dev frontend, desktop builds, and the API image default
  # read. `[skip ci]` keeps it from re-triggering the dev pipeline.
  sync-main-version:
    name: Sync main VERSION → next dev target
    needs: [version, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      # `main` is branch-protected (require PR), so a direct push is rejected
      # (GH006) — which used to fail this job and make Deploy Prod show red even
      # though the release fully shipped. Route the bump through an
      # auto-merged PR instead. Non-fatal: a hiccup here must never fail a
      # successful production deploy (the version is derived from prod, not main's
      # VERSION, so a lagging bump is cosmetic).
      - name: Advance main's VERSION via auto-merged PR
        continue-on-error: true
        env:
          RELEASED: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IFS='.' read -r MA MI PA <<< "$RELEASED"
          NEXT="${MA}.${MI}.$((PA + 1))"
          cur="$(tr -d '[:space:]' < VERSION 2>/dev/null || true)"
          if [ "$cur" = "$NEXT" ]; then echo "main already at $NEXT — nothing to do."; exit 0; fi
          BR="chore/version-bump-$NEXT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          printf '%s\n' "$NEXT" > VERSION
          git add VERSION
          git commit -m "chore(release): main VERSION → $NEXT (dev target after $RELEASED) [skip ci]"
          git push -u origin "$BR" --force-with-lease
          gh pr create --base main --head "$BR" \
            --title "chore(release): VERSION → $NEXT [skip ci]" \
            --body "Auto-bump main's VERSION to the next dev target after the v$RELEASED prod release." || true
          # [skip ci] in the squash subject so merging to main doesn't kick off a
          # full dev build/deploy just for a one-line VERSION bump.
          SUBJ="chore(release): main VERSION → $NEXT (dev target after $RELEASED) [skip ci]"
          gh pr merge "$BR" --squash --delete-branch --subject "$SUBJ" --body "" --admin \
            || gh pr merge "$BR" --squash --delete-branch --subject "$SUBJ" --body "" \
            || true

  # ── Keep staging's VERSION honest too (post-publish) ────────────────────────
  # promote.yml cuts releases FROM `staging` (the pre-prod source of truth) but
  # never bumps its VERSION, and — until this job — only `main` was advanced
  # after publish. So staging's VERSION drifted far behind prod: frozen at
  # whatever `main VERSION →` bump last happened to be synced into it, while
  # prod and main climbed release after release. Advance staging to the SAME
  # next dev target as main so the branch releases are cut from stays
  # version-coherent with prod. Cosmetic (promote derives the release version
  # from prod's VERSION, not staging's), non-fatal, and `[skip ci]` in the
  # squash subject avoids kicking a staging rebuild for a one-line bump.
  sync-staging-version:
    name: Sync staging VERSION → next dev target
    needs: [version, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
      - name: Advance staging's VERSION via auto-merged PR
        continue-on-error: true
        env:
          RELEASED: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IFS='.' read -r MA MI PA <<< "$RELEASED"
          NEXT="${MA}.${MI}.$((PA + 1))"
          cur="$(tr -d '[:space:]' < VERSION 2>/dev/null || true)"
          if [ "$cur" = "$NEXT" ]; then echo "staging already at $NEXT — nothing to do."; exit 0; fi
          BR="chore/staging-version-bump-$NEXT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          printf '%s\n' "$NEXT" > VERSION
          git add VERSION
          git commit -m "chore(release): staging VERSION → $NEXT (dev target after $RELEASED) [skip ci]"
          git push -u origin "$BR" --force-with-lease
          gh pr create --base staging --head "$BR" \
            --title "chore(release): staging VERSION → $NEXT [skip ci]" \
            --body "Auto-bump staging's VERSION to the next dev target after the v$RELEASED prod release." || true
          SUBJ="chore(release): staging VERSION → $NEXT (dev target after $RELEASED) [skip ci]"
          gh pr merge "$BR" --squash --delete-branch --subject "$SUBJ" --body "" --admin \
            || gh pr merge "$BR" --squash --delete-branch --subject "$SUBJ" --body "" \
            || true

  # ── Lower the "release in progress" banner — ONLY when the rollout is green ───
  # `needs: deploy-api` with the default `if: success()` means this runs only
  # after the API has rolled out to the new version AND passed its health gate
  # (deploy-api hard-fails otherwise). migrate-db is upstream of deploy-api, so a
  # failed migration also keeps the banner up. If the rollout fails, this job is
  # skipped and the critical banner stays raised — deliberately, so users keep
  # seeing it until an admin clears or escalates it from the console. Best-effort
  # and non-clobbering: only clears the banner if it is still OUR rollout banner.
  maintenance-banner-off:
    name: Rollout banner (lower)
    needs: [deploy-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect maintenance token
        id: cfg
        env:
          TOKEN: ${{ secrets.PROD_MAINTENANCE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::PROD_MAINTENANCE_TOKEN not set — skipping rollout banner clear."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Lower rollout banner
        if: steps.cfg.outputs.enabled == 'true'
        continue-on-error: true
        env:
          MAINTENANCE_TOKEN: ${{ secrets.PROD_MAINTENANCE_TOKEN }}
        run: bash scripts/ci-maintenance-banner.sh off

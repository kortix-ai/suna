name: Deploy Prod

# PROD pipeline. Runs when `prod` advances — i.e. when a reviewed promote PR is
# MERGED (promote.yml opens it) — or on manual dispatch. This is the ONLY place
# a version is published: the tag `vX.Y.Z`, the GitHub Release, the image retag,
# the ECS roll, and the frontend all happen here, never before the prod merge.
# The root VERSION on `prod` is the clean version `X.Y.Z`.
#
#   1. Retag the dev images (kortix/kortix-*:dev-latest) → :X.Y.Z + :latest
#      (multi-arch manifest copy, zero rebuilds).
#   2. Build the prod CLI (4 targets, default api.kortix.com) + prod desktop
#      installers and cut a single GitHub Release `vX.Y.Z`.
#   3. Roll the `kortix-prod` ECS Fargate service onto the new image (OIDC).
#   4. Deploy the prod frontend on Vercel (the `prod` branch → kortix.com).
#
# The prod stack is api-prod.kortix.com (ECS) + kortix.com (Vercel). The legacy
# new.kortix.com Vercel domain was retired in the apex cutover — same pipeline.

on:
  push:
    branches: [prod]
  workflow_dispatch:
  # Promotion is review-gated: promote.yml opens a PR into `prod`, and a human
  # MERGES it after approval. That merge is a real `push` to `prod` (above) and
  # triggers this pipeline normally — so no workflow_run hook is needed (and we
  # must NOT deploy merely because Promote *opened* the PR).

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Resolve the version from VERSION ────────────────────────────────────────
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    # Runs on every push to `prod` (i.e. a merged, reviewed release PR) and on
    # manual dispatch.
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      title: ${{ steps.v.outputs.title }}
      notes: ${{ steps.v.outputs.notes }}
      source_sha: ${{ steps.v.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full tags + annotations to read the release notes
      - name: Read VERSION + release notes (committed by the promote PR)
        id: v
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < VERSION)"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          echo "Publishing v$V"

          # promote.yml committed RELEASE_NOTES.md (line 1 = title, rest = notes)
          # onto the release branch; it merged into prod with this release. The
          # tag does NOT exist yet — the GitHub Release job creates it at this
          # prod commit. (Nothing was published before this merge.)
          if [ -f RELEASE_NOTES.md ]; then
            echo "title=$(head -n1 RELEASE_NOTES.md)" >> "$GITHUB_OUTPUT"
            {
              echo 'notes<<KORTIX_NOTES_EOF'
              tail -n +3 RELEASE_NOTES.md
              echo 'KORTIX_NOTES_EOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "title=" >> "$GITHUB_OUTPUT"
            { echo 'notes<<KORTIX_NOTES_EOF'; echo 'KORTIX_NOTES_EOF'; } >> "$GITHUB_OUTPUT"
          fi

          # The exact source commit this release was cut from (stamped by
          # promote.yml). Empty for legacy releases that predate SHA stamping.
          if [ -f RELEASE_SOURCE_SHA ]; then
            SRC="$(tr -d '[:space:]' < RELEASE_SOURCE_SHA)"
            echo "source_sha=$SRC" >> "$GITHUB_OUTPUT"
            echo "Release source commit: $SRC"
          else
            echo "source_sha=" >> "$GITHUB_OUTPUT"
            echo "No RELEASE_SOURCE_SHA (legacy release) — will retag :dev-latest"
          fi

  # ── Retag dev images → versioned + latest (no rebuild) ──────────────────────
  retag-images:
    name: Re-tag dev → v${{ needs.version.outputs.version }}
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Re-tag release images
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SOURCE_SHA: ${{ needs.version.outputs.source_sha }}
        run: |
          set -euo pipefail
          # Pin to the dev image built from the EXACT promoted commit. If that
          # image isn't pushed yet (dev build not finished), imagetools create
          # fails fast — prod can NEVER ship a stale image. Fall back to the
          # floating :dev-latest only for legacy releases with no stamped SHA.
          if [ -n "${SOURCE_SHA:-}" ]; then
            SRC_TAG="dev-${SOURCE_SHA:0:8}"
          else
            SRC_TAG="dev-latest"
          fi
          echo "Source image tag: $SRC_TAG"
          for IMAGE in kortix/kortix-api kortix/kortix-frontend; do
            if ! docker buildx imagetools inspect "$IMAGE:$SRC_TAG" >/dev/null 2>&1; then
              echo "::error::$IMAGE:$SRC_TAG not found — the dev image for this commit isn't published. Refusing to ship a stale image."
              exit 1
            fi
            echo "Re-tagging $IMAGE:$SRC_TAG → $IMAGE:${VERSION} + $IMAGE:latest"
            docker buildx imagetools create \
              --tag "$IMAGE:${VERSION}" \
              --tag "$IMAGE:latest" \
              "$IMAGE:$SRC_TAG"
            echo "✓ $IMAGE:${VERSION}"
          done
      - name: Summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          {
            echo "### Re-tagged dev-latest → v${VERSION}"
            echo "- \`kortix/kortix-api:${VERSION}\` (multi-arch)"
            echo "- \`kortix/kortix-frontend:${VERSION}\` (multi-arch)"
            echo ""
            echo "_Zero rebuilds — re-tagged from dev-latest manifests._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Build prod CLI (4 targets on one Linux runner via Bun cross-compile) ────
  build-cli:
    name: Build prod CLI (all targets)
    needs: version
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace deps (pnpm)
        # The repo's lockfile is pnpm format; `bun install` cannot migrate it
        # ("PnpmLockfileTooOld"), so install deps with pnpm and compile with bun.
        run: |
          corepack enable && corepack prepare pnpm@latest --activate || true
          pnpm install --frozen-lockfile
        env:
          npm_config_engine_strict: "false"

      - name: Build every target (Bun cross-compile)
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          API_BASE="https://api.kortix.com"
          mkdir -p artifacts
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "↻ building kortix-$t (cli $VERSION)"
            bun build \
              --compile \
              --minify \
              --target="bun-$t" \
              --define="process.env.KORTIX_CLI_VERSION=\"${VERSION}\"" \
              --define="process.env.KORTIX_DEFAULT_API_BASE=\"${API_BASE}\"" \
              --outfile="artifacts/kortix-$t" \
              apps/cli/src/index.ts
          done
          cd artifacts
          chmod +x kortix-*
          ls -lh

      - name: Smoke test (native linux-x64)
        run: ./artifacts/kortix-linux-x64 version

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-binaries
          path: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
          if-no-files-found: error

  # ── Build prod desktop installers (per-OS signed matrix) ────────────────────
  build-desktop:
    name: Build prod desktop ${{ matrix.target_pretty }}
    needs: version
    runs-on: ${{ matrix.runner }}
    env:
      DESKTOP_URL: https://kortix.com/dashboard
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_pretty: macos-arm64
            runner: macos-14
            bundles: dmg
            artifact: desktop-macos-arm64
            files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          - target_pretty: macos-x64
            # macos-13 (Intel) GitHub-hosted runners are retired, so this job
            # queued forever waiting for a runner. Cross-compile the x64 build
            # on the Apple-Silicon runner via the x86_64 Rust target instead.
            runner: macos-14
            rust_target: x86_64-apple-darwin
            bundles: dmg
            artifact: desktop-macos-x64
            files: apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - target_pretty: windows-x64
            runner: windows-2022
            bundles: msi
            artifact: desktop-windows-x64
            files: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          - target_pretty: linux-x64
            runner: ubuntu-22.04
            bundles: appimage
            artifact: desktop-linux-x64
            files: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            wget

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compile target
        if: matrix.rust_target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @kortix/desktop
        env:
          npm_config_engine_strict: "false"

      # Never hard-fail on missing certs — a release should always ship an
      # installer. Sign (+ notarize on macOS) when the platform's secrets are
      # present; otherwise build UNSIGNED (Gatekeeper/SmartScreen warning).
      - name: Decide signing
        id: sign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          enabled=false
          case "${{ runner.os }}" in
            macOS)   [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && enabled=true ;;
            Windows) [ -n "$WINDOWS_CERTIFICATE" ] && [ -n "$WINDOWS_CERTIFICATE_PASSWORD" ] && enabled=true ;;
            *)       enabled=true ;;
          esac
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          [ "$enabled" = true ] && echo "::notice::${{ runner.os }} signing ENABLED." \
                                || echo "::warning::${{ runner.os }} signing secrets absent — building UNSIGNED."

      - name: Prepare macOS notarization key
        if: runner.os == 'macOS' && steps.sign.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -n "$APPLE_API_KEY_P8" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && steps.sign.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Configure production desktop build
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          SIGN_ENABLED: ${{ steps.sign.outputs.enabled }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/desktop/src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.version = process.env.VERSION;
          config.productName = 'Kortix';
          config.identifier = 'com.kortix.desktop';
          if (process.env.SIGN_ENABLED === 'true' && process.env.WINDOWS_CERTIFICATE_THUMBPRINT) {
            config.bundle ||= {};
            config.bundle.windows ||= {};
            config.bundle.windows.certificateThumbprint = process.env.WINDOWS_CERTIFICATE_THUMBPRINT;
            config.bundle.windows.digestAlgorithm = 'sha256';
            config.bundle.windows.timestampUrl = process.env.WINDOWS_TIMESTAMP_URL || 'http://timestamp.digicert.com';
          }
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
          NODE

      - name: Prepare desktop shell assets
        run: pnpm --filter @kortix/desktop run prepare-assets

      # Apple env vars only when signing is enabled → Tauri signs + notarizes;
      # empty otherwise → unsigned bundle.
      - name: Build desktop installer
        run: pnpm --filter @kortix/desktop tauri build --bundles ${{ matrix.bundles }}${{ matrix.rust_target && format(' --target {0}', matrix.rust_target) || '' }}
        env:
          KORTIX_DESKTOP_DEFAULT_URL: ${{ env.DESKTOP_URL }}
          APPLE_CERTIFICATE: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_ISSUER: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_API_KEY || '' }}
          APPLE_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ steps.sign.outputs.enabled == 'true' && (secrets.APPLE_PASSWORD || secrets.APPLE_APP_SPECIFIC_PASSWORD) || '' }}
          APPLE_TEAM_ID: ${{ steps.sign.outputs.enabled == 'true' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  # ── Cut a single GitHub Release vX.Y.Z (CLI + desktop) ──────────────────────
  # Cut the release as soon as the CLI + images are ready — it does NOT wait on
  # desktop. Desktop builds on slow, scarce, signed macOS/Windows runners that
  # can get stuck queued for ~50min (or fail on a cert problem); waiting on them
  # would block every release. Desktop installers are attached afterward by the
  # separate `attach-desktop` job, best-effort. So a desktop problem can never
  # delay or block the API/frontend/CLI release.
  github-release:
    name: GitHub Release v${{ needs.version.outputs.version }}
    needs: [version, retag-images, build-cli]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-binaries
          path: artifacts/

      - name: Assemble release assets + checksums
        run: |
          set -euo pipefail
          mkdir -p release
          cp -v artifacts/kortix-* release/
          cd release
          sha256sum * > SHA256SUMS
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          # Human title + notes from the tag annotation (set at promote time) lead
          # the release; the auto-generated PR list is appended below them.
          name: ${{ needs.version.outputs.title != '' && format('{0} — {1}', needs.version.outputs.tag, needs.version.outputs.title) || needs.version.outputs.tag }}
          body: ${{ needs.version.outputs.notes }}
          generate_release_notes: true
          files: |
            release/*

  # ── Attach desktop installers to the release (best-effort, non-blocking) ─────
  # Runs after the release is already cut. Uploads whatever desktop installers
  # built; if desktop failed entirely it's a no-op and the release simply ships
  # without installers (re-run desktop + this job later to add them).
  attach-desktop:
    name: Attach desktop installers
    needs: [version, github-release, build-desktop]
    if: always() && needs.github-release.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: desktop-artifacts/
          pattern: desktop-*
          merge-multiple: true

      - name: Upload installers to the release (if any built)
        run: |
          set -euo pipefail
          if [ ! -d desktop-artifacts ] || [ -z "$(ls -A desktop-artifacts 2>/dev/null)" ]; then
            echo "::warning::No desktop installers built — release ships CLI + images only."
            exit 0
          fi
          cd desktop-artifacts
          sha256sum * > DESKTOP-SHA256SUMS
          gh release upload "${{ needs.version.outputs.tag }}" * --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Roll the prod ECS service onto the freshly-tagged image ─────────────────
  # The kortix-prod task definition pins kortix/kortix-api:latest (retagged
  # above), so force-new-deployment re-pulls it and rolls the service. Auth via
  # OIDC (no long-lived keys). The stack is already applied + validated.
  deploy-api:
    name: Deploy API to prod (ECS)
    needs: [version, retag-images]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # assume the AWS role via GitHub OIDC
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::935064898258:role/kortix-gha-ecs-deploy
          aws-region: us-west-2
      - name: Roll the prod ECS service (with clean version stamped)
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          CLUSTER=kortix-prod; SERVICE=kortix-prod

          # The image is retagged (not rebuilt), so it carries the promoted DEV
          # build's KORTIX_VERSION default. Register a new task-def revision that
          # sets the container env KORTIX_VERSION to the clean X.Y.Z, so prod
          # /v1/health reports e.g. 0.9.1 (not 0.9.1-dev.<sha>). Everything else
          # in the task def is preserved verbatim.
          echo "Stamping KORTIX_VERSION=$VERSION onto a new kortix-prod task-def revision…"
          CURRENT_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          aws ecs describe-task-definition --task-definition "$CURRENT_TD" \
            --query 'taskDefinition' --output json > td.json

          # Drop read-only fields, then upsert KORTIX_VERSION into each container's
          # env (jq — no heredoc, robust inside the YAML run block).
          jq --arg v "$VERSION" '
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
            | .containerDefinitions |= map(
                .environment = ((.environment // []) | map(select(.name != "KORTIX_VERSION"))
                                 + [{name: "KORTIX_VERSION", value: $v}]))
          ' td.json > td-new.json

          NEW_TD=$(aws ecs register-task-definition --cli-input-json file://td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered $NEW_TD"

          echo "Rolling $SERVICE onto v$VERSION…"
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" \
            --task-definition "$NEW_TD" --force-new-deployment >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].{running:runningCount,desired:desiredCount,rollout:deployments[0].rolloutState}' \
            --output table
      - name: Summary
        if: always()
        run: |
          {
            echo "### Deployed API → **prod** (ECS Fargate)"
            echo "v${{ needs.version.outputs.version }} rolled onto ECS service \`kortix-prod\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Prod frontend (Vercel) ──────────────────────────────────────────────────
  # No job here: the Vercel project is git-connected and auto-deploys the `prod`
  # branch on every push (→ kortix.com) — the same way dev.kortix.com
  # auto-deploys from `main`. The promote workflow's push to `prod` triggers it.
  frontend-note:
    name: Prod frontend (Vercel auto-deploys prod)
    needs: version  # gate with the rest of the pipeline (skipped on a failed promote)
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          {
            echo "### Frontend → **prod** (Vercel)"
            echo "Vercel auto-deploys the \`prod\` branch (→ kortix.com). No action needed here."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Keep main's VERSION honest (post-publish, never premature) ──────────────
  # promote.yml does NOT bump main's VERSION (publishing is gated on the prod
  # merge). After a release publishes, advance main's VERSION to the NEXT dev
  # target (released patch + 1) so the single source of truth tracks prod: this
  # is what the Vercel dev frontend, desktop builds, and the API image default
  # read. `[skip ci]` keeps it from re-triggering the dev pipeline.
  sync-main-version:
    name: Sync main VERSION → next dev target
    needs: [version, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Advance main's VERSION to released patch + 1
        env:
          RELEASED: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          IFS='.' read -r MA MI PA <<< "$RELEASED"
          NEXT="${MA}.${MI}.$((PA + 1))"
          cur="$(tr -d '[:space:]' < VERSION 2>/dev/null || true)"
          if [ "$cur" = "$NEXT" ]; then echo "main already at $NEXT — nothing to do."; exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          printf '%s\n' "$NEXT" > VERSION
          git add VERSION
          git commit -m "chore(release): main VERSION → $NEXT (dev target after $RELEASED) [skip ci]"
          git push origin HEAD:main

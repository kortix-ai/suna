name: Promote Enterprise Stable

on:
  workflow_dispatch:
    inputs:
      prod_version:
        description: Exact already-published production version X.Y.Z
        required: true
        type: string
      enterprise_revision:
        description: Enterprise revision number N for X.Y.Z-eN
        required: true
        type: number
      compatibility_contract:
        description: Reviewed repo-relative compatibility contract JSON
        required: true
        type: string
      notify_customers:
        description: Send optional release hints after publication
        required: true
        default: true
        type: boolean

concurrency:
  group: enterprise-tuf-repository
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  promote:
    name: Sign and publish immutable stable release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: enterprise-stable
    env:
      AWS_REGION: ${{ vars.ENTERPRISE_PUBLISHER_REGION || 'us-west-2' }}
      EXPECTED_ACCOUNT_ID: ${{ vars.ENTERPRISE_PUBLISHER_ACCOUNT_ID || '935064898258' }}
      RELEASE_BUCKET: ${{ vars.ENTERPRISE_RELEASE_BUCKET }}
      REPOSITORY_KMS_KEY_ARN: ${{ vars.ENTERPRISE_REPOSITORY_KMS_KEY_ARN }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.ENTERPRISE_CLOUDFRONT_DISTRIBUTION_ID }}
      KORTIX_TUF_TARGETS_KEY_ARN: ${{ vars.ENTERPRISE_TUF_TARGETS_KEY_ARN }}
      KORTIX_TUF_SNAPSHOT_KEY_ARN: ${{ vars.ENTERPRISE_TUF_SNAPSHOT_KEY_ARN }}
      KORTIX_TUF_TIMESTAMP_KEY_ARN: ${{ vars.ENTERPRISE_TUF_TIMESTAMP_KEY_ARN }}
      KORTIX_TUF_ROOT_SHA256: ${{ vars.ENTERPRISE_TUF_ROOT_SHA256 }}
      COSIGN_KEY_ARN: ${{ vars.ENTERPRISE_COSIGN_KEY_ARN }}
      CUSTOMER_EVENT_BUSES_JSON: ${{ vars.ENTERPRISE_CUSTOMER_EVENT_BUSES_JSON || '[]' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Validate protected promotion input and production provenance
        id: release
        env:
          PROD_VERSION: ${{ inputs.prod_version }}
          REVISION: ${{ inputs.enterprise_revision }}
          CONTRACT: ${{ inputs.compatibility_contract }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = refs/heads/main
          [[ "$PROD_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$REVISION" =~ ^[1-9][0-9]*$ ]]
          test -n "$RELEASE_BUCKET"
          test -n "$REPOSITORY_KMS_KEY_ARN"
          test -n "$CLOUDFRONT_DISTRIBUTION_ID"
          test -n "$KORTIX_TUF_TARGETS_KEY_ARN"
          test -n "$KORTIX_TUF_SNAPSHOT_KEY_ARN"
          test -n "$KORTIX_TUF_TIMESTAMP_KEY_ARN"
          [[ "$KORTIX_TUF_ROOT_SHA256" =~ ^[a-f0-9]{64}$ ]]
          test -n "$COSIGN_KEY_ARN"

          contract_path=$(realpath "$CONTRACT")
          case "$contract_path" in "$GITHUB_WORKSPACE"/infra/enterprise-releases/*) ;; *) echo "compatibility contract must be under infra/enterprise-releases" >&2; exit 1 ;; esac
          test -f "$contract_path"

          git fetch --force origin prod --tags
          gh release view "v$PROD_VERSION" --json isDraft --jq 'select(.isDraft == false) | true' | grep -qx true
          test "$(git show "v$PROD_VERSION:VERSION" | tr -d '[:space:]')" = "$PROD_VERSION"
          source_sha=$(git show "v$PROD_VERSION:RELEASE_SOURCE_SHA" | tr -d '[:space:]')
          [[ "$source_sha" =~ ^[a-f0-9]{40}$ ]]
          git cat-file -e "$source_sha^{commit}"

          enterprise_version="$PROD_VERSION-e$REVISION"
          echo "prod_version=$PROD_VERSION" >> "$GITHUB_OUTPUT"
          echo "enterprise_version=$enterprise_version" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
          echo "enterprise_source_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "contract=$contract_path" >> "$GITHUB_OUTPUT"

      - name: Configure publisher AWS identity
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.ENTERPRISE_PROMOTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify publisher account
        run: |
          set -euo pipefail
          account=$(aws sts get-caller-identity --query Account --output text)
          test "$account" = "$EXPECTED_ACCOUNT_ID"

      - name: Install workspace and checksum-pinned signing tools
        run: |
          set -euo pipefail
          corepack enable pnpm
          pnpm install --frozen-lockfile --filter "@kortix/enterprise-release..."
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-amd64 -o /tmp/cosign
          echo 'caaad125acef1cb81d58dcdc454a1e429d09a750d1e9e2b3ed1aed8964454708  /tmp/cosign' | sha256sum --check --strict
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            https://github.com/google/go-containerregistry/releases/download/v0.20.3/go-containerregistry_Linux_x86_64.tar.gz -o /tmp/crane.tar.gz
          echo '36c67a932f489b3f2724b64af90b599a8ef2aa7b004872597373c0ad694dc059  /tmp/crane.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/crane.tar.gz -C /tmp crane
          sudo install -m 0755 /tmp/cosign /tmp/crane /usr/local/bin/

      - name: Authenticate to the production OCI registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve and enterprise-sign exact production image digests
        id: images
        env:
          PROD_VERSION: ${{ steps.release.outputs.prod_version }}
        run: |
          set -euo pipefail
          for role in api frontend gateway; do
            image="docker.io/kortix/kortix-$role"
            digest=$(crane digest "$image:$PROD_VERSION")
            [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]
            ref="$image@$digest"
            cosign sign --yes --key "awskms:///$COSIGN_KEY_ARN" "$ref"
            echo "$role=$ref" >> "$GITHUB_OUTPUT"
          done
          cosign public-key --key "awskms:///$COSIGN_KEY_ARN" > /tmp/cosign.pub
          test -s /tmp/cosign.pub

      - name: Build deterministic platform, Supabase, and updater artifacts
        env:
          ENTERPRISE_VERSION: ${{ steps.release.outputs.enterprise_version }}
        run: |
          set -euo pipefail
          BUN_COMPILE_TARGET=bun-linux-x64 pnpm --filter "@kortix/enterprise-updater" build
          test -x apps/enterprise-updater/dist/kortix-enterprise-updater
          bun apps/enterprise-release/src/build-bundles.ts --version "$ENTERPRISE_VERSION" --output-dir /tmp/bundles
          for bundle in platform supabase; do
            tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
              --format=posix --pax-option=delete=atime,delete=ctime \
              -C "/tmp/bundles/$bundle" -cf "/tmp/$bundle.tar" .
            gzip -n -9 "/tmp/$bundle.tar"
          done
          test -s /tmp/platform.tar.gz
          test -s /tmp/supabase.tar.gz

      - name: Generate and validate strict release manifest
        env:
          ENTERPRISE_VERSION: ${{ steps.release.outputs.enterprise_version }}
          PROD_VERSION: ${{ steps.release.outputs.prod_version }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
          ENTERPRISE_SOURCE_SHA: ${{ steps.release.outputs.enterprise_source_sha }}
          CONTRACT: ${{ steps.release.outputs.contract }}
          API_IMAGE: ${{ steps.images.outputs.api }}
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend }}
          GATEWAY_IMAGE: ${{ steps.images.outputs.gateway }}
        run: |
          set -euo pipefail
          bun apps/enterprise-release/src/generate-manifest.ts \
            --prod-version "$PROD_VERSION" --enterprise-version "$ENTERPRISE_VERSION" \
            --source-sha "$SOURCE_SHA" --enterprise-source-sha "$ENTERPRISE_SOURCE_SHA" \
            --compatibility-contract "$CONTRACT" --api-image "$API_IMAGE" \
            --frontend-image "$FRONTEND_IMAGE" --gateway-image "$GATEWAY_IMAGE" \
            --platform-bundle /tmp/platform.tar.gz --supabase-bundle /tmp/supabase.tar.gz \
            --cosign-public-key /tmp/cosign.pub \
            --updater-binary apps/enterprise-updater/dist/kortix-enterprise-updater \
            --output /tmp/enterprise-release.json

      - name: Publish through existing threshold-root TUF repository
        env:
          ENTERPRISE_VERSION: ${{ steps.release.outputs.enterprise_version }}
          ENTERPRISE_SOURCE_SHA: ${{ steps.release.outputs.enterprise_source_sha }}
        run: |
          set -euo pipefail
          install -d -m 0700 /tmp/tuf-repository
          aws s3 sync "s3://$RELEASE_BUCKET/" /tmp/tuf-repository/ --only-show-errors
          test -s /tmp/tuf-repository/metadata/1.root.json
          test -s /tmp/tuf-repository/metadata/root.json
          bun apps/enterprise-release/src/publish.ts \
            --repository-dir /tmp/tuf-repository \
            --manifest /tmp/enterprise-release.json \
            --platform-bundle /tmp/platform.tar.gz \
            --supabase-bundle /tmp/supabase.tar.gz \
            --cosign-public-key /tmp/cosign.pub \
            --updater-binary apps/enterprise-updater/dist/kortix-enterprise-updater
          bootstrap_dir="/tmp/tuf-repository/bootstrap/$ENTERPRISE_SOURCE_SHA"
          install -d -m 0700 "$bootstrap_dir"
          install -m 0700 apps/enterprise-updater/dist/kortix-enterprise-updater \
            "$bootstrap_dir/kortix-enterprise-updater-linux-amd64"
          # TUF publication is ordered: targets and delegated metadata first,
          # timestamp last. Clients therefore see either the complete previous
          # repository or the complete new one, never a timestamp that points
          # at objects which have not reached S3 yet.
          aws s3 sync /tmp/tuf-repository/ "s3://$RELEASE_BUCKET/" \
            --exclude 'metadata/root.json' --exclude 'metadata/*.root.json' \
            --exclude 'metadata/timestamp.json' \
            --sse aws:kms --sse-kms-key-id "$REPOSITORY_KMS_KEY_ARN" --only-show-errors
          aws s3 cp /tmp/tuf-repository/metadata/timestamp.json \
            "s3://$RELEASE_BUCKET/metadata/timestamp.json" \
            --content-type application/json --sse aws:kms \
            --sse-kms-key-id "$REPOSITORY_KMS_KEY_ARN" --only-show-errors
          invalidation=$(aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/metadata/*' '/targets/channels/stable.json' --query Invalidation.Id --output text)
          aws cloudfront wait invalidation-completed --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --id "$invalidation"
          root_sha=$(sha256sum /tmp/tuf-repository/metadata/1.root.json | awk '{print $1}')
          bootstrap_sha=$(sha256sum "$bootstrap_dir/kortix-enterprise-updater-linux-amd64" | awk '{print $1}')
          echo "ROOT_SHA=$root_sha" >> "$GITHUB_ENV"
          echo "BOOTSTRAP_SHA=$bootstrap_sha" >> "$GITHUB_ENV"

      - name: Send optional customer-owned release hints
        if: inputs.notify_customers
        env:
          ENTERPRISE_VERSION: ${{ steps.release.outputs.enterprise_version }}
        run: |
          set -euo pipefail
          jq -e 'type == "array" and all(.[]; type == "string")' <<<"$CUSTOMER_EVENT_BUSES_JSON" >/dev/null
          while IFS= read -r bus; do
            [ -n "$bus" ] || continue
            detail=$(jq -cn --arg release "$ENTERPRISE_VERSION" '{channel:"stable",release:$release}')
            entries=$(jq -cn --arg bus "$bus" --arg detail "$detail" \
              '[{Source:"com.kortix.enterprise.release",DetailType:"Kortix stable release",Detail:$detail,EventBusName:$bus}]')
            aws events put-events --entries "$entries" >/dev/null
          done < <(jq -r '.[]' <<<"$CUSTOMER_EVENT_BUSES_JSON")

      - name: Promotion summary
        env:
          ENTERPRISE_VERSION: ${{ steps.release.outputs.enterprise_version }}
          ENTERPRISE_SOURCE_SHA: ${{ steps.release.outputs.enterprise_source_sha }}
        run: |
          repository_url="https://${{ vars.ENTERPRISE_RELEASE_DOMAIN }}"
          {
            echo "### Enterprise stable $ENTERPRISE_VERSION"
            echo "- Application images: exact prod digests, enterprise KMS-signed"
            echo "- Enterprise source: \`$ENTERPRISE_SOURCE_SHA\`"
            echo "- TUF root SHA-256: \`$ROOT_SHA\`"
            echo "- Bootstrap SHA-256: \`$BOOTSTRAP_SHA\`"
            echo "- Bootstrap URL: \`$repository_url/bootstrap/$ENTERPRISE_SOURCE_SHA/kortix-enterprise-updater-linux-amd64\`"
          } >> "$GITHUB_STEP_SUMMARY"

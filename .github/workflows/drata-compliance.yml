name: drata-compliance-as-code

# Drata Compliance-as-Code: scans the repo's Infrastructure-as-Code (the
# Terraform under infra/) for misconfigurations and reports results back to
# Drata, gating on test severity. Supports SOC 2 (CC) — shifts infra
# compliance left so misconfigs are caught in CI before they reach AWS.
#
# The pipeline FAILS if any test at or above `minimumSeverity` fails.
# Auth: the pipeline key lives in repo secret DRATA_IAC_PIPELINE_KEY
# (never committed — referenced only via ${{ secrets.* }}).

on:
  push:
    branches: [main, staging, prod]
    paths:
      - "infra/**"
      - ".github/workflows/drata-compliance.yml"
  pull_request:
    branches: [main, staging, prod]
    paths:
      - "infra/**"
      - ".github/workflows/drata-compliance.yml"
  workflow_dispatch:
    inputs:
      results_run_id:
        description: "Optional prior Drata scan ID to print sanitized finding details"
        required: false
        type: string
      print_monitor_state:
        description: "Print sanitized production monitor status"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  drata-iac-results:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.results_run_id != '' || inputs.print_monitor_state) }}
    name: sanitized-finding-details
    runs-on: ubuntu-latest
    steps:
      - name: Print finding details
        if: ${{ inputs.results_run_id != '' }}
        env:
          DRATA_API_TOKEN: ${{ secrets.DRATA_IAC_PIPELINE_KEY }}
          RUN_ID: ${{ inputs.results_run_id }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${DRATA_API_TOKEN}" \
            --header "Content-Type: application/json" \
            "https://public-api.drata.com/public/workspaces/1/pipelines/results?runId=${RUN_ID}" \
            | jq --compact-output '.designGaps[] | {
                severity,
                testId,
                fileName,
                lineNumber,
                description,
                currentValue,
                preferredValue,
                resourceMetadata
              }'

      - name: Print production monitor state
        if: ${{ inputs.print_monitor_state }}
        env:
          DRATA_API_TOKEN: ${{ secrets.DRATA_IAC_PIPELINE_KEY }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${DRATA_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --header "User-Agent: kortix-compliance-ci" \
            "https://public-api.drata.com/public/v2/workspaces/1/monitoring-tests?size=500&includeTotalCount=true" \
            | jq '{
                total: .pagination.totalCount,
                statusCounts: (.data | group_by(.checkResultStatus) | map({key: .[0].checkResultStatus, value: length}) | from_entries),
                enabled: [.data[] | select(.checkStatus == "ENABLED") | {testId, name, checkResultStatus}],
                failing: [.data[] | select(.checkStatus == "ENABLED" and .checkResultStatus != "PASSED") | {testId, name, checkResultStatus}]
              }'

  drata-iac-scan:
    name: compliance-as-code-action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Drata Github Action
        id: drata
        uses: drata/compliance-as-code-action@v1.0.0
        env:
          DRATA_API_TOKEN: ${{ secrets.DRATA_IAC_PIPELINE_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # A green compliance workflow must mean zero known IaC findings.
          # Gating only CRITICAL allowed High/Moderate findings to keep the
          # corresponding Drata monitors failed while CI still reported green.
          minimumSeverity: "LOW"
          verboseLogging: true

name: Promote to Production

# Manual promotion: bumps the unified root VERSION, commits it to `main`, tags
# `vX.Y.Z`, and opens a REVIEW-GATED PR (release/vX.Y.Z → `prod`). `prod` is a
# protected branch (required approving review, no direct/force push), so a
# second person must approve before merge. MERGING that PR advances `prod`,
# whose push event triggers deploy-prod.yml (image retag + GitHub Release +
# prod ECS roll + prod frontend deploy). This is the SOC2 production change-
# review gate; `main` (dev) stays push-friendly.
#
# `prod` is the production branch: it deploys api-prod.kortix.com (ECS Fargate)
# and new.kortix.com (Vercel) today, and api.kortix.com + kortix.com after the
# apex DNS cutover. This is the ONLY way a clean version `X.Y.Z` enters prod;
# dev builds on `main` are always `X.Y.Z-dev.<sha8>`.

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Release title — a human one-liner shown on the changelog (e.g. "Warm pool + billing fixes")'
        required: true
        type: string
      notes:
        description: 'Release notes — what changed and why, for the public changelog (markdown ok)'
        required: true
        type: string
      bump:
        description: 'Semver bump (ignored if an explicit version is given)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: 'Explicit version override (e.g. 0.9.1) — optional'
        required: false
        type: string
      ref:
        description: 'Source ref to promote (default main)'
        required: false
        default: main
        type: string

concurrency:
  group: promote
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Bump VERSION, tag, open review-gated prod PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ inputs.ref }} (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Compute new version
        id: ver
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < VERSION)"
          echo "Current VERSION: $CURRENT"

          EXPLICIT="${{ inputs.version }}"
          if [ -n "$EXPLICIT" ]; then
            NEW="${EXPLICIT#v}"  # tolerate a leading v
          else
            # Parse X.Y.Z and bump.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            : "${MAJOR:=0}"; : "${MINOR:=0}"; : "${PATCH:=0}"
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW="${MAJOR}.${MINOR}.${PATCH}"
          fi

          # Validate semver X.Y.Z.
          if ! echo "$NEW" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Computed version '$NEW' is not valid X.Y.Z semver" >&2
            exit 1
          fi

          echo "New VERSION: $NEW"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Write VERSION + commit to ${{ inputs.ref }}
        # Inputs are passed via env (never interpolated into the script) so a
        # title/notes with quotes or shell metacharacters can't break the run.
        env:
          IN_TITLE: ${{ inputs.title }}
          IN_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          NEW="${{ steps.ver.outputs.new }}"
          TAG="${{ steps.ver.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Idempotent-ish: only write+commit if VERSION actually changed.
          printf '%s\n' "$NEW" > VERSION
          if git diff --quiet -- VERSION; then
            echo "VERSION already at $NEW — no commit needed."
          else
            git add VERSION
            git commit -m "chore(release): $TAG"
            git push origin "HEAD:${{ inputs.ref }}"
          fi

          # Create/replace the annotated tag at the current commit. The tag
          # annotation IS the release entry that deploy-prod.yml turns into the
          # GitHub Release (and thus the public changelog): subject line = title,
          # body = notes. This is why title/notes are required on dispatch.
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists locally — re-pointing."
          fi
          printf '%s\n\n%s\n' "$IN_TITLE" "$IN_NOTES" | git tag -fa "$TAG" -F -
          git push -f origin "$TAG"

      - name: Open review-gated release PR to prod
        env:
          GH_TOKEN: ${{ github.token }}
          IN_TITLE: ${{ inputs.title }}
          IN_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          SHA="$(git rev-parse HEAD)"
          RELBR="release/$TAG"
          # `prod` is a protected branch (required review, no direct/force push),
          # so promotion is gated on a human approval. Freeze exactly what we
          # promote on an ephemeral release branch, then open a PR into prod.
          # A second person approves; merging the PR is what advances prod and
          # triggers deploy-prod.yml (via the push event on prod).
          git push -f origin "$SHA:refs/heads/$RELBR"
          existing="$(gh pr list --base prod --head "$RELBR" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ]; then
            echo "Release PR #$existing already open for $RELBR."
          else
            printf '%s\n\n%s\n\n---\n_Promotion of `%s` to production. Requires one approving review; merging triggers the prod deploy (deploy-prod.yml)._\n' \
              "$IN_TITLE" "$IN_NOTES" "$TAG" \
              | gh pr create --base prod --head "$RELBR" --title "Release $TAG — $IN_TITLE" --body-file -
          fi

      - name: Summary
        run: |
          {
            echo "### Release PR opened for prod"
            echo ""
            echo "- Previous VERSION: \`${{ steps.ver.outputs.current }}\`"
            echo "- New VERSION: \`${{ steps.ver.outputs.new }}\`"
            echo "- Tag: \`${{ steps.ver.outputs.tag }}\`"
            echo "- Source ref: \`${{ inputs.ref }}\` → \`release/${{ steps.ver.outputs.tag }}\` → PR into \`prod\`"
            echo ""
            echo "_Review-gated promotion: a second person must approve the PR into \`prod\`. **Merging** it advances \`prod\` and triggers **deploy-prod.yml** — retag image → \`v${{ steps.ver.outputs.new }}\` + \`:latest\`, cut the GitHub Release, roll the \`kortix-prod\` ECS service, and deploy the prod frontend._"
          } >> "$GITHUB_STEP_SUMMARY"

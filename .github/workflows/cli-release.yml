name: CLI release

# Triggered by pushing a tag like `cli-v0.1.0`. Builds the standalone
# `kortix` binary for darwin-x64, darwin-arm64, linux-x64, linux-arm64
# using `bun build --compile --target=bun-<os>-<arch>`, then attaches
# each artifact to a GitHub Release at the tag.
#
# The website's /install endpoint (kortix.com/install) serves
# scripts/install.sh, which curls one of these binaries.

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write

env:
  CLI_API_BASE: https://api.kortix.com

jobs:
  build:
    name: Build ${{ matrix.target_pretty }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            target_pretty: darwin-arm64
            asset: kortix-darwin-arm64
            runner: macos-14
          - target: bun-darwin-x64
            target_pretty: darwin-x64
            asset: kortix-darwin-x64
            runner: macos-13
          - target: bun-linux-x64
            target_pretty: linux-x64
            asset: kortix-linux-x64
            runner: ubuntu-22.04
          - target: bun-linux-arm64
            target_pretty: linux-arm64
            asset: kortix-linux-arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build CLI binary
        run: |
          CLI_VERSION="${GITHUB_REF_NAME#cli-v}"
          bun build \
            --compile \
            --minify \
            --target=${{ matrix.target }} \
            --define="process.env.KORTIX_CLI_VERSION=\"${CLI_VERSION}\"" \
            --define="process.env.KORTIX_DEFAULT_API_BASE=\"${{ env.CLI_API_BASE }}\"" \
            --outfile=${{ matrix.asset }} \
            apps/cli/src/index.ts
          ls -lh ${{ matrix.asset }}

      - name: Smoke test (--version)
        if: matrix.target_pretty == 'darwin-arm64' || matrix.target_pretty == 'linux-x64'
        run: ./${{ matrix.asset }} version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd artifacts
          ls -lh
          sha256sum kortix-* > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/kortix-darwin-arm64
            artifacts/kortix-darwin-x64
            artifacts/kortix-linux-x64
            artifacts/kortix-linux-arm64
            artifacts/SHA256SUMS

name: secret-scan

# Scans pull-request commits for committed secrets with gitleaks.
# Supports SOC 2 CC6.1 (protect credentials). Complements GitHub's native
# secret scanning + push protection (which cover known provider patterns).
# We run the gitleaks binary directly: the gitleaks GitHub Action requires a
# paid license for organizations, but the binary itself is free (MIT).

on:
  pull_request:
    branches: [main, prod]
  merge_group: # run in the GitHub merge queue (required check)

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version

      - name: Scan changed commits for secrets
        env:
          BASE_SHA: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo "::error::Unable to determine commit range for ${GITHUB_EVENT_NAME}."
            exit 1
          fi
          ./gitleaks git \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --redact --verbose --exit-code 1

name: Build Snapshot

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Legacy snapshot version. Disabled for repo-first v1.'
        required: false
        default: dev-latest
      target:
        description: 'Legacy target. Disabled for repo-first v1.'
        required: false
        default: dev

jobs:
  disabled:
    name: Disabled legacy snapshot builder
    runs-on: ubuntu-latest
    steps:
      - name: Explain v1 path
        run: |
          echo "The legacy provider snapshot builder is disabled for repo-first Kortix v1." >&2
          echo "Build and publish the provider-neutral sandbox image from apps/sandbox/Dockerfile instead." >&2
          exit 1

# yaml-language-server: $schema=https://kortix.com/schema/kortix.v2.schema.json
kortix_version: 2

default_agent: support

project:
  name: "{{projectName}}"
  description: A customer support agent that triages tickets and drafts on-brand replies.

env:
  required: []
  optional: []

opencode:
  config_dir: .kortix/opencode

agents:
  support:
    connectors: all
    secrets: all
    kortix_cli: all
    skills: all

triggers: []

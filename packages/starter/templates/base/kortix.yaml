# yaml-language-server: $schema=https://kortix.com/schema/kortix.v3.schema.json
#
# Kortix project manifest. Source of truth for project-wide config that
# lives in git alongside the code. `kortix_version` pins the schema so
# the platform can evolve safely. v3 is ACP-first: `runtimes` selects an
# official ACP harness and its native config directory; `agents` registers
# logical Kortix identities, routes each one to a runtime, and owns only
# platform governance. Prompts, models, providers, hooks, modes, and runtime
# permissions stay in `.claude`, `.codex`, `.kortix/opencode`, or `.pi`.
kortix_version: 3

# The agent a session/trigger boots when it names no concrete agent (the
# "default" sentinel). Must always resolve to a declared agent below.
default_agent: kortix

project:
  name: "{{projectName}}"
  description: A Kortix project.

# Env vars the runtime needs. Required values must be set in the Kortix
# Secrets Manager before a session can start.
env:
  required: []
  optional: [STRIPE_API_KEY]

# ─── Sandbox templates ───────────────────────────────────────────────────
# Sessions boot from a sandbox image. The platform's default image (Ubuntu +
# the Kortix runtime layer) is always available — sessions clone your repo
# into /workspace at boot, so no per-project build is needed by default.
#
# Define `sandbox.templates` entries below if you want named custom images
# for this project. Each entry can point at either a Dockerfile in the repo
# (`dockerfile: …`) or a public Docker image (`image: …`). Pick one or
# the other. The Kortix runtime layer is always added on top.
#
# Hardware: cpu = cores, memory = GiB, disk = GiB. All optional.
#
# Example — custom Dockerfile:
# sandbox:
#   templates:
#     - slug: ml
#       name: ML Development
#       dockerfile: .kortix/Dockerfile.ml
#       cpu: 4
#       memory: 16
#       disk: 50
#
# Example — public Docker image:
# sandbox:
#   templates:
#     - slug: python
#       name: Python 3.12
#       image: python:3.12-slim
#       cpu: 2
#       memory: 4
#
# Make one template the project-wide default — every session (UI, triggers,
# channels) then boots it without passing a slug. Omit for the platform default.
# sandbox:
#   default: python

# ─── ACP runtime profiles ────────────────────────────────────────────────
# These are launch profiles, not translated configuration. The selected
# official ACP adapter reads the harness's own native files directly.
runtimes:
  opencode:
    harness: opencode
    config_dir: .kortix/opencode
  claude:
    harness: claude
    config_dir: .claude
  codex:
    harness: codex
    config_dir: .codex
  pi:
    harness: pi
    config_dir: .pi

# ─── Agents ──────────────────────────────────────────────────────────────
# One map per project, GOVERNANCE + ROUTING ONLY. `runtime` references a
# profile above; optional `agent` is that harness's native agent/profile id.
# Everything else lives in the selected harness's config directory. v3 is
# deny-by-default: an omitted connectors/
# secrets/kortix_cli/skills grant resolves to "none", so a scoped specialist
# starts locked down. The starter's own `kortix` agent is deliberately
# granted "all" across the board so a fresh project is capable out of the
# box — narrow it once you know what this project actually needs.
agents:
  kortix:
    runtime: opencode
    agent: kortix
    connectors: all
    secrets: all
    kortix_cli: all
    skills: all

  claude:
    runtime: claude
    connectors: all
    secrets: all
    kortix_cli: all
    skills: all

  codex:
    runtime: codex
    connectors: all
    secrets: all
    kortix_cli: all
    skills: all

  pi:
    runtime: pi
    connectors: all
    secrets: all
    kortix_cli: all
    skills: all

  memory-reflector:
    runtime: opencode
    agent: memory-reflector
    # Scoped specialist: only what its job needs (open — never merge — a
    # memory CR). No connectors, no project secrets.
    kortix_cli: [project.cr.open]

# ─── Triggers ────────────────────────────────────────────────────────────
# Each entry spawns a fresh session that runs `prompt` as its initial
# message. Add from the Kortix UI or uncomment one below. Slugs must be
# lowercase URL-safe and unique per project. `agent` must name a declared
# agent above (or be omitted to fall back to `default_agent`).

triggers:
  # Memory reflector — surveys recent project activity and curates
  # `.kortix/memory/` (the project brain). Reads its rubric from the
  # `kortix-memory` skill. Opens a `memory: …` change request at the end
  # of each run; exits silently when nothing is worth changing.
  #
  # Disabled by default. Flip `enabled: true` once your project has
  # enough activity for reflection to find signal — usually after the
  # first week or two.
  - slug: memory-reflector
    name: Memory reflector
    type: cron
    agent: memory-reflector
    enabled: false
    cron: "0 0 3 * * *" # 03:00 daily
    timezone: UTC
    prompt: |
      Load the `kortix-memory` skill, then reflect on the last 24h of
      project activity: git log, merged CRs, and every session that ran
      in the window (`kortix sessions digest --since 24h` — analyze what
      each session actually did). Update `.kortix/memory/` per the rubric
      and open a single CR titled `memory: …`. Exit silently if nothing is
      worth changing.

  # Cron trigger — fires on a 6-field croner expression
  # (second minute hour day month weekday).
  #
  # - slug: daily-digest
  #   name: Daily digest
  #   type: cron
  #   agent: kortix                  # must name a declared agent above
  #   enabled: true
  #   cron: "0 0 9 * * 1-5"          # 09:00 Mon–Fri
  #   timezone: America/Los_Angeles
  #   prompt: |
  #     Summarize yesterday's commits across the repo. Save the result to
  #     notes/digest-{{ fired_at }}.md and open a PR against main.
  #
  # Webhook trigger — fires on signed POSTs to
  #   /v1/webhooks/projects/<project_id>/<slug>
  # Signature header: `X-Kortix-Signature: sha256=<hmac>` (HMAC-SHA256 over
  # the raw body using the secret named by `secret_env`).
  # GitHub's `X-Hub-Signature-256` is also accepted.
  #
  # - slug: slack-hook
  #   name: Slack handler
  #   type: webhook
  #   agent: kortix
  #   enabled: true
  #   secret_env: WEBHOOK_SLACK_SECRET  # add the value via Secrets Manager
  #   prompt: |
  #     Slack event from {{ headers.user_agent }}.
  #     User said: {{ body.text }}

# ─── Channels ────────────────────────────────────────────────────────────
# v2 removes `channels` from the manifest — channel↔agent routing (Slack
# today; Teams/Discord/etc. later) is managed live in the dashboard
# (Customize → Channels), not committed to git. The channel integration
# itself still shows up here as a `connectors` entry with
# `provider: channel` once you connect one — that part is unchanged.

# ─── Apps ────────────────────────────────────────────────────────────────
# Each `apps` entry is a deployable website. Kortix builds it and serves it
# on a free `*.style.dev` URL (or your own domain). Experimental — gated by
# the platform flag KORTIX_APPS_EXPERIMENTAL, not available in prod. No app
# ships by default; manage these from the dashboard's Apps panel once the
# flag is on for your project, or see docs/reference/manifest.mdx for the
# field reference.

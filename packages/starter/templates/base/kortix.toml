# Kortix project manifest. Source of truth for project-wide config that
# lives in git alongside the code. `kortix_version` pins the schema so
# the platform can evolve safely.
kortix_version = 1

[project]
name = "{{projectName}}"
description = "A Kortix project."

# Env vars the runtime needs. Required values must be set in the Kortix
# Secrets Manager before a session can start.
[env]
required = []
optional = ["ANTHROPIC_API_KEY", "OPENAI_API_KEY"]

# Sandbox base image. Sessions run from a snapshot built off this
# Dockerfile — the Kortix snapshot builder always layers the agent
# daemon + opencode CLI on top automatically. Define whatever workspace
# tooling you want in the Dockerfile; the Kortix runtime slots in on top.
[sandbox]
dockerfile = ".kortix/Dockerfile"
context = "."

# OpenCode runtime config dir. The agent daemon launches opencode with
# OPENCODE_CONFIG_DIR pointed here, so agents/skills/commands/tools live
# under this folder. Defaults to `.kortix/opencode` — relocate if you
# want to share a single opencode config across multiple Kortix repos.
[opencode]
config_dir = ".kortix/opencode"

# ─── Triggers ────────────────────────────────────────────────────────────
# Each `[[triggers]]` entry spawns a fresh session that runs `prompt` as
# its initial message. Add from the Kortix UI or uncomment one below.
# Slugs must be lowercase URL-safe and unique per project.
#
# Cron trigger — fires on a 6-field croner expression
# (second minute hour day month weekday).
#
# [[triggers]]
# slug = "daily-digest"
# name = "Daily digest"
# type = "cron"
# agent = "kortix"                # any agent under [opencode] config_dir
# enabled = true
# cron = "0 0 9 * * 1-5"          # 09:00 Mon–Fri
# timezone = "America/Los_Angeles"
# prompt = """
# Summarize yesterday's commits across the repo. Save the result to
# notes/digest-{{ fired_at }}.md and open a PR against main.
# """
#
# Webhook trigger — fires on signed POSTs to
#   /v1/webhooks/projects/<project_id>/<slug>
# Signature header: `X-Kortix-Signature: sha256=<hmac>` (HMAC-SHA256 over
# the raw body using the secret named by `secret_env`).
# GitHub's `X-Hub-Signature-256` is also accepted.
#
# [[triggers]]
# slug = "slack-hook"
# name = "Slack handler"
# type = "webhook"
# agent = "kortix"
# enabled = true
# secret_env = "WEBHOOK_SLACK_SECRET"  # add the value via Secrets Manager
# prompt = """
# Slack event from {{ headers.user_agent }}.
# User said: {{ body.text }}
# """

# ─── Channels ────────────────────────────────────────────────────────────
# Bind a chat surface (Slack today; Teams/Discord/etc. later) to this
# project. Messages in the bound channel spawn project sessions; agent
# output streams back into the same thread.
#
# Account-level OAuth install lives in the Kortix dashboard. Each
# [[channels]] entry below points at one channel inside an installed
# workspace.
#
# Server is gated by KORTIX_CHANNELS_MODE (single | multi | auto). Hit
# GET /v1/webhooks/chat/health to see which mode the server resolved to.
#
# Slack requires publicly reachable HTTPS for OAuth redirect, event
# subscriptions, interactivity, and slash commands — so for local dev
# point your Slack app at an ngrok / cloudflared tunnel, not localhost.
#
# [[channels]]
# slug = "eng-slack"
# name = "Engineering Slack"
# platform = "slack"                  # currently: slack
# channel_id = "C01234567"            # or channel_name = "#engineering"
# enabled = true
# agent = "kortix"                    # any agent under [opencode] config_dir
# events = ["mention", "dm"]          # mention | dm | subscribed | slash | action
# response = "text"                   # plan | text | none
# prompt_prefix = """
# You're working on {{ project.name }}.
# {{ message.text }}
# """
#
#   [[channels.slash_commands]]
#   name = "plan"
#   prompt = "Draft a plan for: {{ args }}"
#
#   [[channels.slash_commands]]
#   name = "review"
#   prompt = "Review the open PR at {{ args }} and post feedback."

# ─── Apps (experimental) ─────────────────────────────────────────────────
# Gated by the platform flag KORTIX_APPS_EXPERIMENTAL. When off, entries
# are parsed but never acted on. One `[[apps]]` entry per deployable.
#
# [[apps]]
# slug = "marketing-site"
# name = "Marketing site"
# enabled = true
# framework = "next"
# domains = ["marketing.example.com"]
#
#   [apps.source]
#   type = "git"                  # or "tar"
#   repo = "https://github.com/me/site"
#   branch = "main"
#   root_path = "apps/site"       # path inside the repo to deploy from
#
#   [apps.build]
#   command = "pnpm build"
#   out_dir = "dist"
#
#   [apps.env]
#   NEXT_PUBLIC_API_URL = "https://api.example.com"

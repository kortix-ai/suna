# Grafana dashboard provisioned from git (source of truth). Sidecar auto-loads
# ConfigMaps labeled grafana_dashboard=1. To change: edit in the Grafana UI ->
# Share -> Export -> JSON, then commit it back here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kortix-capacity-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kortix-platform
data:
  capacity.json: |
    {
      "title": "Kortix \u2014 Capacity & Efficiency",
      "uid": "kortix-capacity",
      "tags": [
        "kortix",
        "platform",
        "cost"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "editable": true,
      "links": [
        {
          "type": "dashboards",
          "tags": [
            "kortix"
          ],
          "title": "Kortix dashboards",
          "asDropdown": true,
          "includeVars": true,
          "keepTime": true,
          "icon": "apps"
        }
      ],
      "templating": {
        "list": []
      },
      "annotations": {
        "list": [
          {
            "name": "Deploys",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": true,
            "iconColor": "rgba(0,150,255,1)",
            "expr": "changes(kube_deployment_status_observed_generation{namespace=~\"kortix.*\"}[2m]) > 0",
            "step": "60s",
            "titleFormat": "deploy",
            "tagKeys": "namespace,deployment"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Cluster capacity",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "CPU requested vs allocatable",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\"}) / sum(kube_node_status_allocatable{resource=\"cpu\"}) * 100",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Memory requested vs allocatable",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 90
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\"}) / sum(kube_node_status_allocatable{resource=\"memory\"}) * 100",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Nodes",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_node_info)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Pods scheduled",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "CPU actual vs requested %",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 3,
            "w": 8,
            "x": 12,
            "y": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])) / clamp_min(sum(kube_pod_container_resource_requests{resource=\"cpu\"}),0.001) * 100",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Spare CPU (cores)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "green",
                    "value": 3
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_node_status_allocatable{resource=\"cpu\"}) - sum(kube_pod_container_resource_requests{resource=\"cpu\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 8,
          "type": "row",
          "title": "Requests by namespace (who's reserving capacity)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 7
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "CPU requests by namespace",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 40,
                "stacking": {
                  "mode": "normal"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"cpu\"})",
              "legendFormat": "{{namespace}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Memory requests by namespace",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 40,
                "stacking": {
                  "mode": "normal"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"memory\"})",
              "legendFormat": "{{namespace}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 11,
          "type": "row",
          "title": "Right-sizing \u2014 usage vs requests (low % = over-provisioned)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 16
          }
        },
        {
          "id": 12,
          "type": "table",
          "title": "Memory: usage / request per workload",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 17
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sort_desc(sum by (namespace,pod) (container_memory_working_set_bytes{container!=\"\",namespace=~\"kortix.*|monitoring\"}) / clamp_min(sum by (namespace,pod) (kube_pod_container_resource_requests{resource=\"memory\"}),1) * 100)",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {}
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "CPU usage vs requested (cluster)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 17
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))",
              "legendFormat": "used",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\"})",
              "legendFormat": "requested",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "C",
              "expr": "sum(kube_node_status_allocatable{resource=\"cpu\"})",
              "legendFormat": "allocatable",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 14,
          "type": "row",
          "title": "Pods per node",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 26
          }
        },
        {
          "id": 15,
          "type": "table",
          "title": "Node capacity & pod density",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 27
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sort_desc(count by (node) (kube_pod_info))",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {}
            }
          ]
        }
      ]
    }

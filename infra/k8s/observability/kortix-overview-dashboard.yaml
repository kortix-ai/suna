# Grafana dashboard provisioned from git (source of truth). The Grafana sidecar
# auto-loads ConfigMaps labeled grafana_dashboard=1. To change it: edit in the
# Grafana UI -> Share -> Export -> JSON, then commit it back here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kortix-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kortix-platform
data:
  kortix-overview.json: |
    {
      "title": "Kortix \u2014 Platform Overview",
      "uid": "kortix-overview",
      "tags": [
        "kortix",
        "platform"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "editable": true,
      "templating": {
        "list": []
      },
      "annotations": {
        "list": [
          {
            "name": "Deploys",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": true,
            "iconColor": "rgba(0,150,255,1)",
            "expr": "changes(kube_deployment_status_observed_generation{namespace=~\"kortix.*\"}[2m]) > 0",
            "step": "60s",
            "titleFormat": "deploy",
            "tagKeys": "namespace,deployment"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Fleet \u2014 at a glance",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "API pods ready (prod)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "green",
                    "value": 3
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_status_replicas_available{namespace=\"kortix-prod\",deployment=\"kortix-api\"}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "API pods ready (dev)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_deployment_status_replicas_available{namespace=\"kortix-dev\",deployment=\"kortix-api\"}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pods running (all ns)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "API req/s",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total[5m]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 6,
          "type": "row",
          "title": "kortix-api \u2014 golden signals",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Request rate by status",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 40,
                "stacking": {
                  "mode": "normal"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (rate(http_requests_total[5m]))",
              "legendFormat": "{{status}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "5xx error rate %",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_requests_total[5m])),0.001) * 100",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 9,
          "type": "stat",
          "title": "p95 latency",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 3
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "p95 latency by route",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 12,
            "y": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le,route) (rate(http_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{route}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Top routes by traffic",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(8, sum by (route) (rate(http_requests_total[5m])))",
              "legendFormat": "{{route}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Event-loop lag (ms)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "nodejs_eventloop_lag_seconds * 1000",
              "legendFormat": "{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "Resources \u2014 by namespace",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 22
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Memory (working set) by namespace",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 23
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 40,
                "stacking": {
                  "mode": "normal"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (container_memory_working_set_bytes{namespace=~\"kortix.*|monitoring\"})",
              "legendFormat": "{{namespace}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "CPU cores by namespace",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 23
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 40,
                "stacking": {
                  "mode": "normal"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{namespace=~\"kortix.*|monitoring\"}[5m]))",
              "legendFormat": "{{namespace}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 16,
          "type": "row",
          "title": "Deployments \u2014 health & restarts",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 31
          }
        },
        {
          "id": 17,
          "type": "table",
          "title": "Deployments: ready / desired",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 32
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace,deployment) (kube_deployment_status_replicas_available) / sum by (namespace,deployment) (kube_deployment_spec_replicas)",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {}
            }
          ]
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "Pod restarts (15m) \u2014 crashloop watch",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 32
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (namespace,pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"kortix.*|monitoring|kyverno|falco|velero\"}[15m])))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 19,
          "type": "row",
          "title": "Logs \u2014 recent prod errors (Loki)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 40
          }
        },
        {
          "id": 20,
          "type": "logs",
          "title": "kortix-prod errors",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 41
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending",
            "enableLogDetails": true
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"kortix-prod\"} |~ \"(?i)error|exception|5[0-9][0-9]\"",
              "datasource": {
                "type": "loki",
                "uid": "loki"
              }
            }
          ]
        }
      ],
      "links": [
        {
          "type": "dashboards",
          "tags": [
            "kortix"
          ],
          "title": "Kortix dashboards",
          "asDropdown": true,
          "includeVars": true,
          "keepTime": true,
          "icon": "apps"
        }
      ]
    }

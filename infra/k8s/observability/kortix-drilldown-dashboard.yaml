# Grafana dashboard provisioned from git (source of truth). Sidecar auto-loads
# ConfigMaps labeled grafana_dashboard=1. To change: edit in the Grafana UI ->
# Share -> Export -> JSON, then commit it back here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kortix-drilldown-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kortix-platform
data:
  drilldown.json: |
    {
      "title": "Kortix \u2014 Service Drilldown",
      "uid": "kortix-drilldown",
      "tags": [
        "kortix",
        "platform"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "editable": true,
      "links": [
        {
          "type": "dashboards",
          "tags": [
            "kortix"
          ],
          "title": "Kortix dashboards",
          "asDropdown": true,
          "includeVars": true,
          "keepTime": true,
          "icon": "apps"
        }
      ],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "label": "Namespace",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": {
              "query": "label_values(kube_pod_info, namespace)",
              "refId": "ns"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": false,
            "current": {
              "text": "kortix-prod",
              "value": "kortix-prod"
            }
          },
          {
            "name": "pod",
            "type": "query",
            "label": "Pod",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "multi": true,
            "includeAll": true,
            "query": {
              "query": "label_values(kube_pod_info{namespace=\"$namespace\"}, pod)",
              "refId": "pod"
            },
            "refresh": 2,
            "sort": 1,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "name": "Deploys",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "enable": true,
            "iconColor": "rgba(0,150,255,1)",
            "expr": "changes(kube_deployment_status_observed_generation{namespace=~\"kortix.*\"}[2m]) > 0",
            "step": "60s",
            "titleFormat": "deploy",
            "tagKeys": "namespace,deployment"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Workload \u2014 $namespace",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pods running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\",phase=\"Running\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Pods NOT running",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\",phase!=\"Running\"}==1) or vector(0)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Restarts (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[1h]))",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Memory total",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\"})",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 6,
          "type": "table",
          "title": "Pods",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_pod_info{namespace=\"$namespace\",pod=~\"$pod\"}",
              "format": "table",
              "instant": true,
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {}
            }
          ]
        },
        {
          "id": 7,
          "type": "row",
          "title": "Per-pod resources",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 12
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "CPU cores by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Memory (working set) by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\",pod=~\"$pod\",container!=\"\"})",
              "legendFormat": "{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Network RX by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 21
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"$namespace\",pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Network TX by pod",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 21
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"$namespace\",pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Restarts by pod (cumulative)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 29
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "stacking": {
                  "mode": "none"
                },
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "{{pod}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ]
        },
        {
          "id": 13,
          "type": "row",
          "title": "Logs \u2014 $namespace (Loki)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 35
          }
        },
        {
          "id": 14,
          "type": "logs",
          "title": "Live logs",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 11,
            "w": 24,
            "x": 0,
            "y": 36
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "sortOrder": "Descending",
            "enableLogDetails": true
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"$namespace\"}",
              "datasource": {
                "type": "loki",
                "uid": "loki"
              }
            }
          ]
        }
      ]
    }

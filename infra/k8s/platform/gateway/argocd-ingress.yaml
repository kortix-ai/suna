# Argo CD on the shared DevOps gateway ALB at devops.kortix.com/argo.
# Prerequisites: argocd-server MUST run with --rootpath /argo (or
# server.rootpath: /argo in argocd-cmd-params-cm) AND --insecure, since the ALB
# terminates TLS and forwards plain HTTP to the server. Set certificate-arn to
# the devops ACM cert (terraform output devops_certificate_arn).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    alb.ingress.kubernetes.io/group.name: kortix-devops
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-2:935064898258:certificate/3ddaf3f5-cbcc-4a3f-ba05-a3429d06496b
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/inbound-cidrs: 173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22
spec:
  ingressClassName: alb
  rules:
    - host: devops.kortix.com
      http:
        paths:
          - path: /argo
            pathType: Prefix
            backend:
              service:
                name: argo-cd-argocd-server
                port:
                  number: 80

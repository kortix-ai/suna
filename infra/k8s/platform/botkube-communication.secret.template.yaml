# TEMPLATE — do NOT commit real tokens. The real secret is provisioned out-of-band
# (ideally an ExternalSecret from AWS Secrets Manager later). Botkube reads its whole
# communications config from this secret (key: comm_config.yaml) when the chart sets
# existingCommunicationsSecretName: botkube-communication.
#
# Apply with real tokens:
#   1. Create a Slack App (Socket Mode) — paste Botkube's app manifest, enable
#      Socket Mode, install to workspace.
#   2. Grab the Bot token (xoxb-...) and App token (xapp-...).
#   3. Fill them in below + set the channel, then:
#        kubectl -n botkube apply -f <this file with real values>
#
# The channel bindings reference the source/executor names defined in
# infra/k8s/argocd/applications/platform-botkube.yaml (k8s-errors, prometheus-alerts,
# kubectl-ro).
apiVersion: v1
kind: Secret
metadata:
  name: botkube-communication
  namespace: botkube
type: Opaque
stringData:
  comm_config.yaml: |
    communications:
      default-group:
        socketSlack:
          enabled: true
          botToken: "xoxb-REPLACE-WITH-BOT-TOKEN"
          appToken: "xapp-REPLACE-WITH-APP-TOKEN"
          channels:
            default:
              name: "ops"
              bindings:
                executors:
                  - kubectl-ro
                sources:
                  - k8s-errors
                  - prometheus-alerts

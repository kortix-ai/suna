# Prod values for the kortix-gateway chart. Runs in the SAME namespace as
# kortix-api (kortix-prod), reusing its ServiceAccount (kortix-api) + synced
# secret (kortix-api-env). Deployed by Argo CD — a PR bumping image.tag IS the
# deploy; git revert is the rollback.

# Immutable release tag (promote bumps this). NOT :latest in GitOps.
image:
  tag: "0.10.1"
# Prod HA: 3-replica floor, burst to 12 (matches the API's envelope).
replicas: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "1Gi"
# Public, direct. Prod sandboxes hit the gateway straight at this host
# (LLM_GATEWAY_BASE_URL=https://gateway.kortix.com/v1/llm) so LLM streams live
# on gateway pods, not the API — API deploys don't cut in-flight streams.
ingress:
  enabled: true
  host: gateway.kortix.com
  # ACM cert for gateway.kortix.com in eu-west-2 (the prod-eks ALB region).
  certificateArn: "arn:aws:acm:eu-west-2:935064898258:certificate/89358fa4-c7a1-4ea8-82b6-310e9118b41a"
  cloudflareProxied: true
  # Lock the origin ALB to Cloudflare's edge ranges so the LLM gateway can only be
  # reached THROUGH Cloudflare — no direct-to-origin bypass of the edge.
  inboundCidrs: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"

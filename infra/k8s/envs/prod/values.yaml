# Prod environment values for the kortix-api chart, deployed by Argo CD
# (infra/k8s/argocd/applications/prod.yaml). This is the GitOps source of truth
# for what runs on EKS prod — a PR that bumps `image.tag` here IS the deploy;
# `git revert` is the rollback. Verified by `argocd app get kortix-prod`.

# Immutable release tag (promote bumps this). NOT :latest / :dev-latest in GitOps.
image:
  tag: "0.9.106"
kortixVersion: "0.9.106"
env:
  internalKortixEnv: prod
# Explicit container env (overrides the kortix-prod-env secret bundle — k8s env
# wins over envFrom).
extraEnv:
  # Slack identity gate ON in prod so Slack @mentions require the caller to
  # connect their Kortix account and pass project access checks. Kept explicit
  # here so k8s env overrides any stale value in the synced secret bundle.
  SLACK_REQUIRE_USER_IDENTITY: "true"
  # Point sandboxes at the standalone LLM gateway. Must be the PUBLIC host —
  # sandboxes are remote Daytona VMs that can't resolve cluster DNS. Without it
  # the API falls back to its in-API /v1/llm passthrough (OpenRouter-only, wrong
  # catalog shape) and the model picker collapses to a single model.
  LLM_GATEWAY_BASE_URL: "https://gateway.kortix.com/v1/llm"
# CUTOVER COMPLETE (2026-06-21): api.kortix.com is served by api-eks, and EKS now
# OWNS the singleton workers (cron scheduler, project maintenance, migrations).
# ECS Fargate is scaled to 0 — it had held the worker lease while running stale
# 0.9.63 code whose trigger sweep silently skipped every cron fleet-wide
# (pre-#3530), so no cron fired for ~18h. One Postgres leader lease is shared, so
# exactly one EKS pod is leader. KEEP THIS true. If ECS is ever brought back as a
# standby it MUST stay workers-disabled (KORTIX_TRIGGER_SCHEDULER_ENABLED=false)
# so it can never grab the worker lease and starve the scheduler again.
workers:
  enabled: true
# Drizzle migrations as a PreSync hook before each rollout (gates the release on
# schema). The hook (templates/migrate-job.yaml) is in place and ready, but is
# DISABLED on prod until the prod Drizzle ledger is baselined: prod's schema was
# built out-of-band (manual psql) so drizzle.__drizzle_migrations records only 1
# of the 11 committed migrations. Enabling now would make `db:migrate` re-apply
# already-applied migrations and fail the release. Flip to true ONLY after a
# one-time, gated baseline reconciles the ledger to the live schema (see the
# `migration` skill: show SQL, test on a throwaway DB, get go-ahead).
migrate:
  enabled: false
# Prod sizing / HA (chart defaults are already prod-tuned; pinned here explicitly).
replicas: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  # Scale out a bit earlier on memory (was 70%) so the HPA adds a pod and spreads
  # load BEFORE individual pods approach their ceiling. HPA acts on the average,
  # so this is the proactive half; the per-pod OOM ceiling is raised below.
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 60
# The app sits at ~840Mi steady and spiked past the old 1Gi limit → OOMKilled
# (exit 137) → random restarts. HPA can't prevent that (it scales on the average;
# OOM is per-pod + instant). Give each pod real headroom: 2Gi, request==limit so
# QoS is Guaranteed — no per-pod OOM under normal spikes, never evicted under node
# memory pressure. CPU unchanged.
resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
serviceAccount:
  name: kortix-api
  roleArn: arn:aws:iam::935064898258:role/kortix-prod-eks-app
externalSecrets:
  enabled: true
  region: eu-west-2
  secretName: kortix-prod-env
  targetSecretName: kortix-api-env
ingress:
  enabled: true
  host: api-eks.kortix.com
  certificateArn: arn:aws:acm:eu-west-2:935064898258:certificate/27dd2310-c468-428c-b97a-ec46b1eed6fd
  cloudflareProxied: true
  # Lock the origin ALB to Cloudflare's edge ranges so api.kortix.com can only be
  # reached THROUGH Cloudflare — no direct-to-origin WAF/rate-limit bypass. Same
  # allowlist as the devops/argocd ingress and qa-portal.
  inboundCidrs: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"
serviceMonitor:
  enabled: true
  labels:
    release: kps
# Plain rolling Deployment (no canary). The EKS wins we actually want —
# auto-healing (probes restart hung/stale pods), autoscaling (HPA + cluster
# autoscaler), zero-downtime rolling deploys — all come from the Deployment, not
# the canary. Progressive delivery (Argo Rollouts canary + CloudWatch analysis)
# is fragile without real traffic and isn't needed now; flip enabled=true to
# bring it back (the template + min-request guard are kept + ready).
rollout:
  enabled: false
  analysis:
    # DISABLED during the dual-run. api-eks has ~no traffic, and metric-based
    # canary analysis is unreliable without volume — both error-rate (1 5xx = huge
    # %) and p95-latency (cold-start pods) false-abort on the noise. The canary
    # still protects via POD HEALTH (a bad image → pods never go Ready → canary
    # holds/aborts). FLIP TRUE AT THE api.kortix.com CUTOVER, when real traffic
    # makes the analysis meaningful (template + guard are ready and correct).
    enabled: false
    lbArnSuffix: "app/k8s-kortixpr-kortixap-b24c15d61b/a294c0dfce97d54d"
    tgArnSuffix: "targetgroup/k8s-kortixpr-kortixap-0d85bef361/b3b73cd646a9caf2"

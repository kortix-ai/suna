# Dev environment values for the kortix-api chart, deployed by Argo CD
# (infra/k8s/argocd/applications/dev.yaml) onto the dev-eks cluster. GitOps
# source of truth for what runs on EKS dev — deploy-dev-eks.yml bumps `image.tag`
# on every push to `main`; `git revert` is the rollback.

# Immutable dev tag (CI bumps to dev-<sha8> on each main push). Bootstrap value
# is :dev-latest until the first deploy-dev-eks run pins an immutable sha.
image:
  tag: "dev-7f4073bd"
kortixVersion: ""
env:
  internalKortixEnv: dev
# PRE-CUTOVER: dev-api-eks is the candidate while dev-api.kortix.com is still
# served by ECS, so EKS runs API-only and ECS keeps ownership of the dev-tier
# singleton workers (one Postgres leader lease is shared across both on the dev
# data plane). At cutover, flip this to true here AND disable the ECS dev service.
workers:
  enabled: false
# Dev sizing (≤100 users): 1 replica floor, burst to 2. Far below prod's 3→12.
replicas: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
# No PDB on a 1-replica dev: minAvailable 50% rounds to 1 → 0 allowed disruptions,
# which blocks node drain (cluster-autoscaler can't consolidate, upgrades stall).
# A 1-replica deploy has no HA to protect anyway; brief restart on drain is fine.
pdb:
  enabled: false
# Headroom for the provider OAuth device flow: `start` spawns a short-lived
# OpenCode `serve` subprocess (~200-300Mi) inside this container to drive the
# ChatGPT/Codex login, so a 512Mi cap OOM-killed the pod (exit 137) on every
# connect. 2Gi fits the API + a few concurrent device flows. ephemeral-storage
# (2Gi/8Gi) is inherited from the chart base.
resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
serviceAccount:
  name: kortix-api
  # IRSA role from the dev-eks cluster layer (module.app_irsa, name
  # "kortix-dev-eks-app"). Predictable from the role name; verify with
  # `terraform -chdir=infra/terraform/environments/dev-eks/cluster output app_irsa_role_arn`.
  roleArn: arn:aws:iam::935064898258:role/kortix-dev-eks-app
externalSecrets:
  enabled: true
  region: us-west-2
  secretName: kortix-dev-env
  targetSecretName: kortix-api-env
ingress:
  enabled: true
  # dev-api.kortix.com is now the Cloudflare Worker's custom domain
  # (infra/cloudflare/workers/api-router, env=dev). It routes here via the clean
  # backend name dev-api-eks.kortix.com (EKS = primary backend) or fails over to
  # the ECS standby (dev-api-ecs-fargate). So EKS serves dev-api-eks ONLY, on its
  # own cert (57eed8f4) — it no longer serves dev-api or borrows the ECS dev ALB
  # cert (a9af6fd8), which is now free for the ECS dev stack alone.
  host: dev-api-eks.kortix.com
  certificateArn: arn:aws:acm:us-west-2:935064898258:certificate/57eed8f4-cba4-4d6a-94ea-1b948708989b
  cloudflareProxied: true
# Plain rolling Deployment (no canary) — same delivery model as prod-eks:
# probe-based auto-healing, HPA autoscaling, zero-downtime rolling deploys.
rollout:
  enabled: false

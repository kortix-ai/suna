{{- if not .Values.bucket }}
{{- fail "bucket is required (the S3 bucket from terraform output bucket_name, e.g. kortix-qa-reports)" }}
{{- end }}
# Stateless QA report portal — proxies reports straight from private S3, holds
# no report bytes on disk (so it can never outgrow its volume and crash-loop).
#
#   web (nginx):     serves the branded landing page at / from a few-KB local
#     file, a /healthz for the probes, and reverse-proxies everything else to the
#     S3 gateway on localhost.
#   s3gw (gateway):  nginx-s3-gateway, used stock — signs each request (SigV4)
#     and streams the object from the PRIVATE bucket. Credentials are IRSA
#     (web identity), no static keys. URL path maps 1:1 to the S3 key, so every
#     existing deep link (/reports/pr/<n>/<run>/index.html) keeps working.
#   index-gen (aws-cli): READ-ONLY sidecar. Every syncIntervalSeconds it lists
#     the reports/ lanes (aws s3 ls) and regenerates the ~few-KB landing
#     index.html into the shared landing volume. Never downloads report bodies.
#
# Only the tiny landing emptyDir is local; report bytes never touch the pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qa-portal.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qa-portal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "qa-portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qa-portal.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      volumes:
        # Holds ONLY the generated landing index.html — kilobytes, never grows.
        - name: landing
          emptyDir:
            sizeLimit: {{ .Values.landingVolumeSizeLimit }}
        # The gateway's /tmp, shared with the sidecar. njs only reads its creds
        # from the hardcoded /tmp/credentials.json (the AWS_CREDENTIALS_TEMP_FILE
        # override isn't declared as an nginx `env`, so njs can't see it), and the
        # gateway's own web-identity fetch is broken on EKS — so the sidecar drops
        # fresh creds straight into the path the gateway natively reads. nginx
        # recreates its own temp dirs + pid file in this volume at startup.
        - name: gw-tmp
          emptyDir:
            sizeLimit: {{ .Values.gwTmpVolumeSizeLimit }}
        - name: landing-script
          configMap:
            name: {{ include "qa-portal.name" . }}-landing
        - name: nginx-conf
          configMap:
            name: {{ include "qa-portal.name" . }}-nginx
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          volumeMounts:
            - name: landing
              mountPath: /landing
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.web | nindent 12 }}
        # S3 gateway: stock nginx-s3-gateway, signs + streams from private S3.
        - name: s3gw
          image: "{{ .Values.s3Gateway.image.repository }}:{{ .Values.s3Gateway.image.tag }}"
          imagePullPolicy: {{ .Values.s3Gateway.image.pullPolicy }}
          env:
            - name: S3_BUCKET_NAME
              value: {{ .Values.bucket | quote }}
            - name: S3_REGION
              value: {{ .Values.region | quote }}
            - name: S3_SERVER
              value: "s3.{{ .Values.region }}.amazonaws.com"
            - name: S3_SERVER_PORT
              value: "443"
            - name: S3_SERVER_PROTO
              value: "https"
            - name: S3_STYLE
              value: "virtual"
            - name: AWS_SIGS_VERSION
              value: "4"
            - name: ALLOW_DIRECTORY_LIST
              value: "false"
            - name: PROVIDE_INDEX_PAGE
              value: "true"
            - name: APPEND_SLASH_FOR_POSSIBLE_DIRECTORY
              value: "true"
            - name: CORS_ENABLED
              value: "false"
          ports:
            - name: s3gw
              containerPort: {{ .Values.s3Gateway.port }}
              protocol: TCP
          volumeMounts:
            # Shared /tmp: nginx writes its temp dirs + pid here, and the sidecar
            # drops /tmp/credentials.json (the file njs reads to sign requests).
            - name: gw-tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.gateway | nindent 12 }}
        # Sidecar (aws-cli): two jobs on the same interval —
        #   1. refresh the gateway's S3 credentials file from IRSA (assume role
        #      via web identity, write /aws-creds/credentials.json atomically).
        #   2. rebuild the landing index.html by listing the reports/ lanes.
        # aws-cli auth itself is IRSA web identity (AWS_ROLE_ARN +
        # AWS_WEB_IDENTITY_TOKEN_FILE auto-injected by EKS); no static keys.
        - name: s3-sidecar
          image: "{{ .Values.awsCli.repository }}:{{ .Values.awsCli.tag }}"
          imagePullPolicy: {{ .Values.awsCli.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Write fresh session creds for the gateway (it reads this file to
              # sign S3 requests). Atomic via temp + mv so the gateway never reads
              # a half-written file. The real STS creds are ~1h; this sidecar owns
              # their lifecycle and refreshes every loop (well within that), so we
              # stamp a far-future `expiration` in the file: the gateway must treat
              # it as always-valid and NEVER run its own refresh — that refresh
              # path is its broken njs STS fetch (TLS verify fails on EKS), which
              # would 500 the request. 4070908800 = 2099-01-01.
              refresh_creds() {
                set -- $(aws sts assume-role-with-web-identity \
                  --role-arn "$AWS_ROLE_ARN" --role-session-name qa-portal \
                  --web-identity-token "$(cat "$AWS_WEB_IDENTITY_TOKEN_FILE")" \
                  --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                  --output text --region "$REGION" 2>/dev/null)
                [ -n "$1" ] && [ -n "$2" ] && [ -n "$3" ] || return 1
                printf '{"accessKeyId":"%s","secretAccessKey":"%s","sessionToken":"%s","expiration":4070908800}' \
                  "$1" "$2" "$3" > /gw-tmp/.credentials.json.tmp \
                  && mv /gw-tmp/.credentials.json.tmp /gw-tmp/credentials.json
              }
              # Prime both up front so the gateway can sign and / is populated
              # within seconds, then refresh on the interval.
              refresh_creds || true
              sh /scripts/gen-index.sh /landing || true
              while true; do
                sleep {{ .Values.syncIntervalSeconds }}
                refresh_creds || true
                sh /scripts/gen-index.sh /landing || true
              done
          env:
            - name: AWS_REGION
              value: {{ .Values.region | quote }}
            # The pod authenticates via IRSA web identity, never IMDS — disabling
            # the metadata probe drops a multi-second per-call timeout, and the
            # regional STS endpoint avoids a global round-trip.
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: AWS_STS_REGIONAL_ENDPOINTS
              value: "regional"
            - name: BUCKET
              value: {{ .Values.bucket | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3Prefix | quote }}
            - name: REGION
              value: {{ .Values.region | quote }}
          volumeMounts:
            - name: gw-tmp
              mountPath: /gw-tmp
            - name: landing
              mountPath: /landing
            - name: landing-script
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.resources.sync | nindent 12 }}

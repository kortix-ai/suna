{{/*
Front nginx config. Serves the branded landing page at / from the small local
`landing` volume (regenerated by the index-gen sidecar) and a /healthz the
probes hit unconditionally, and reverse-proxies every other path to the S3
gateway on localhost, which signs it and streams the object from private S3.

Cache-Control: no-cache forces revalidation so a stale landing page or report
can never get pinned in a browser; the upstream objects are small and a 304 is
cheap. The pod stores no report bytes — only the kilobyte landing index.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "qa-portal.name" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qa-portal.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen       {{ .Values.containerPort }};
        server_name  _;

        add_header Cache-Control "no-cache" always;

        # Probe target — Ready as soon as nginx is up, independent of S3, so the
        # ALB target group can never be empty because of an S3 hiccup.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Branded landing page, generated into /landing by the index-gen sidecar.
        location = / {
            root /landing;
            try_files /index.html =404;
        }
        location = /index.html {
            root /landing;
        }

        # Everything else (the reports) → the S3 gateway, which signs the request
        # and streams the object from the private bucket. URL == S3 key.
        location / {
            proxy_pass http://127.0.0.1:{{ .Values.s3Gateway.port }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

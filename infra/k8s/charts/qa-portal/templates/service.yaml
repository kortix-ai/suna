apiVersion: v1
kind: Service
metadata:
  name: {{ include "qa-portal.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qa-portal.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "qa-portal.selectorLabels" . | nindent 4 }}

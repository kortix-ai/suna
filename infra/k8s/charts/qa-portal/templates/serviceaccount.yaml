apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qa-portal.labels" . | nindent 4 }}
  annotations:
    {{- if not .Values.serviceAccount.roleArn }}
    {{- fail "serviceAccount.roleArn is required (the S3-read IRSA role ARN from terraform output role_arn)" }}
    {{- end }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}

{{- $apiDomain := required "apiDomain is required" .Values.apiDomain -}}
{{- $frontendDomain := required "frontendDomain is required" .Values.frontendDomain -}}
{{- $certificateArn := required "certificateArn is required" .Values.certificateArn -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kortix-enterprise
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: kortix-enterprise-edge
    app.kubernetes.io/part-of: kortix-enterprise
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/certificate-arn: {{ $certificateArn | quote }}
    alb.ingress.kubernetes.io/load-balancer-attributes: {{ printf "idle_timeout.timeout_seconds=%v,deletion_protection.enabled=true" .Values.ingress.idleTimeoutSeconds | quote }}
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
    {{- if .Values.inboundCidrs }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.inboundCidrs | quote }}
    {{- end }}
    external-dns.alpha.kubernetes.io/hostname: {{ printf "%s,%s" $apiDomain $frontendDomain | quote }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ $apiDomain | quote }}
      http:
        paths:
          - path: /v1/llm
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.gateway }}
                port: { name: http }
          {{- range list "/auth/v1" "/rest/v1" "/realtime/v1" "/storage/v1" "/functions/v1" "/graphql/v1" }}
          - path: {{ . | quote }}
            pathType: Prefix
            backend:
              service:
                name: kortix-supabase
                port: { name: http }
          {{- end }}
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.services.api }}
                port: { name: http }
    - host: {{ $frontendDomain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kortix-frontend
                port: { name: http }

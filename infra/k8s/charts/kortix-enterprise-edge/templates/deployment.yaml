apiVersion: apps/v1
kind: Deployment
metadata:
  name: kortix-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-enterprise-edge.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "kortix-enterprise-edge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kortix-enterprise-edge.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kortix-enterprise-edge.selectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kortix-enterprise-edge.selectorLabels" . | nindent 14 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ include "kortix-enterprise-edge.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: KORTIX_PUBLIC_URL
              value: {{ printf "https://%s" .Values.frontendDomain | quote }}
            - name: KORTIX_PUBLIC_BACKEND_URL
              value: {{ printf "https://%s/v1" .Values.apiDomain | quote }}
            - name: KORTIX_PUBLIC_SUPABASE_URL
              value: {{ printf "https://%s" .Values.apiDomain | quote }}
            - name: KORTIX_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runtimeSecretName }}
                  key: ANON_KEY
            - name: NEXT_PUBLIC_BILLING_ENABLED
              value: "false"
          startupProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

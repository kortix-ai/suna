{{- if .Values.migrate.enabled }}
# Drizzle migrations as an Argo CD PreSync hook: on every sync (i.e. the promote's
# image bump), this runs `db:migrate` BEFORE the Deployment rolls. A failed
# migration fails the hook → the sync halts → the new image never rolls, so code
# can never ship ahead of its schema. Same image + same synced secret bundle as
# the app (DATABASE_URL lives there) — no extra credentials, nothing in CI.
# `drizzle-kit migrate` is idempotent (it records applied migrations), so a sync
# with nothing pending is a fast no-op.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kortix-api.name" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-api.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    # Keep the finished Job for log inspection; replace it at the next sync.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "kortix-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: Never
      {{- if .Values.security.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.security.runAsNonRoot }}
        runAsUser: {{ .Values.security.runAsUser }}
        runAsGroup: {{ .Values.security.runAsGroup }}
        seccompProfile:
          type: {{ .Values.security.seccompProfile }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app/packages/db
          command: ["bunx", "drizzle-kit", "migrate"]
          # The full synced secret bundle (DATABASE_URL included), exactly as the app.
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecrets.targetSecretName }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          {{- if .Values.security.enabled }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.security.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: false
            {{- if .Values.security.dropAllCapabilities }}
            capabilities:
              drop: ["ALL"]
            {{- end }}
          {{- end }}
{{- end }}

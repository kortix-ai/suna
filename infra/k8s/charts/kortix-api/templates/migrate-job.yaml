{{- if .Values.migrate.enabled }}
# Canonical packages/db migrations as an Argo CD PreSync/Helm hook: on every
# sync (i.e. the promote's image bump), this runs the same node-pg-migrate
# ledger as production BEFORE the Deployment rolls. A failed
# migration fails the hook → the sync halts → the new image never rolls, so code
# can never ship ahead of its schema. Same image + same synced secret bundle as
# the app (DATABASE_URL lives there) — no extra credentials, nothing in CI.
# `migrate.ts up` is idempotent (it records applied migrations), so a sync with
# nothing pending is a fast no-op.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kortix-api.name" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-api.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    # Keep the finished Job for log inspection; replace it at the next sync.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrate.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "kortix-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      restartPolicy: Never
      {{- if .Values.security.enabled }}
      securityContext:
        runAsNonRoot: {{ .Values.security.runAsNonRoot }}
        runAsUser: {{ .Values.security.runAsUser }}
        runAsGroup: {{ .Values.security.runAsGroup }}
        seccompProfile:
          type: {{ .Values.security.seccompProfile }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "kortix-api.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app/packages/db
          # Enterprise starts from an official, otherwise-empty Supabase data
          # plane. bootstrap installs the self-host prerequisites on first run
          # and is a no-op before applying pending migrations thereafter.
          command: ["bun", "scripts/migrate.ts", "bootstrap"]
          # The full synced secret bundle (DATABASE_URL included), exactly as the app.
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecrets.targetSecretName }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          {{- if .Values.security.enabled }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.security.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: false
            {{- if .Values.security.dropAllCapabilities }}
            capabilities:
              drop: ["ALL"]
            {{- end }}
          {{- end }}
{{- end }}

{{- /*
Optional self-managed namespace. OFF by default (dev/prod deploy into a namespace
that already exists). Ephemeral previews turn this ON so the namespace is a chart
resource Argo OWNS — and therefore PRUNES on PR close, instead of the orphaned
empty shell left by the ApplicationSet's CreateNamespace=true sync option.
*/ -}}
{{- if .Values.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- if .Values.podSecurity.enforce }}
    pod-security.kubernetes.io/enforce: {{ .Values.podSecurity.enforce }}
    pod-security.kubernetes.io/enforce-version: {{ .Values.podSecurity.version }}
    {{- end }}
    pod-security.kubernetes.io/audit: {{ .Values.podSecurity.audit }}
    pod-security.kubernetes.io/audit-version: {{ .Values.podSecurity.version }}
    pod-security.kubernetes.io/warn: {{ .Values.podSecurity.warn }}
    pod-security.kubernetes.io/warn-version: {{ .Values.podSecurity.version }}
  annotations:
    # Create the namespace before everything that lands in it.
    argocd.argoproj.io/sync-wave: "-1"
{{- end }}

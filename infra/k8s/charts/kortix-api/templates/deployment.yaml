apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kortix-api.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-api.labels" . | nindent 4 }}
spec:
  # When the HPA owns replicas, omit the static count so a deploy can't briefly
  # reset it (the HPA reconciles it anyway).
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kortix-api.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
  template:
    metadata:
      labels:
        {{- include "kortix-api.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods whenever the synced secret changes so config updates take
        # effect without a manual restart.
        checksum/secret-name: {{ .Values.externalSecrets.targetSecretName | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.topologySpread.enabled }}
      # Keep replicas spread across AZs first, then nodes — a node or full-AZ
      # loss can never take out all pods. ScheduleAnyway so a temporary skew
      # never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kortix-api.selectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kortix-api.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.containerPort | quote }}
            {{- if .Values.kortixVersion }}
            - name: KORTIX_VERSION
              value: {{ .Values.kortixVersion | quote }}
            {{- end }}
            {{- range $k, $v := .Values.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          # All secrets (the synced bundle) as environment variables.
          {{- if .Values.externalSecrets.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecrets.targetSecretName }}
          {{- end }}
          # Drain before exit: on SIGTERM, sleep so the ALB deregisters this pod
          # (readiness + target-group deregistration) before the process stops.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          # startup: tolerate a slow first boot; liveness: restart a hung pod;
          # readiness: pull a not-ready pod out of the ALB until it recovers.
          startupProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: http
            periodSeconds: 5
            failureThreshold: {{ .Values.health.startupFailureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: http
            periodSeconds: {{ .Values.health.livenessPeriodSeconds }}
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: http
            periodSeconds: {{ .Values.health.readinessPeriodSeconds }}
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

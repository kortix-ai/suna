{{- if .Values.externalSecrets.enabled }}
# Reads Secrets Manager by assuming the app ServiceAccount's IRSA role — so the
# secret bundle never leaves AWS except as a synced in-cluster Secret. This is
# the SAME bundle the ECS prod task pulls per-key; here we extract the whole JSON
# at once into one Secret consumed via envFrom.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: kortix-api-store
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-api.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.targetSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kortix-api.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: kortix-api-store
    kind: SecretStore
  target:
    name: {{ .Values.externalSecrets.targetSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  # Pull every key from the JSON bundle into the synced Secret.
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.secretName }}
{{- end }}

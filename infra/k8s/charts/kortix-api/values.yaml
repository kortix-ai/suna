# Defaults for the kortix-api chart. Environment-specific values (cert ARN, IRSA
# role, hostname) are filled at deploy time from the cluster layer's Terraform
# outputs — see .github/workflows/deploy-prod-eks.yml and infra/EKS.md.

image:
  repository: kortix/kortix-api
  # Overridden per deploy with the released version (e.g. 0.9.36). :latest is the
  # safe default but prod CI always pins an explicit tag.
  tag: latest
  pullPolicy: IfNotPresent

# Reported by GET /v1/health (matches the ECS task-def KORTIX_VERSION stamp).
kortixVersion: ""

# Render the destination Namespace as a chart resource. OFF for dev/prod (the
# namespace pre-exists). Previews set this true so Argo owns + prunes it on PR
# close (see templates/namespace.yaml).
createNamespace: false

containerPort: 8000

# HA + autoscaling. replicas is the floor the HPA scales from.
replicas: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# Pod resource envelope. requests drive scheduling + cluster-autoscaler; limits
# are the safety ceiling. The limits are deliberately HIGHER than requests
# (Burstable QoS) so a transient spike can burst into spare node capacity
# instead of being CFS-throttled or OOM-killed:
#   - cpu limit "1" used to throttle the single-threaded event loop the moment a
#     burst (e.g. an error/log storm) tried to use >1 core — turning a slow
#     period into a hang. Headroom to 2 lets it ride the burst out.
#   - memory limit == request ("1Gi") left zero slack, so a buffer spike (e.g. a
#     backed-up log/telemetry queue) OOM-killed the pod. 2Gi absorbs it.
# (Both failure modes were seen in the 2026-06-18 EKS incident.)
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
    # Reserve disk so the scheduler spreads pods instead of stacking heavy
    # snapshot-context writers onto one node.
    ephemeral-storage: "2Gi"
  limits:
    cpu: "2"
    memory: "2Gi"
    # Cap per-pod ephemeral use: a runaway build-context leak evicts THAT pod
    # individually, instead of filling the node and tripping DiskPressure that
    # evicts healthy neighbours cluster-wide. The tmp-reaper keeps steady-state
    # well under this; the limit is the backstop.
    ephemeral-storage: "8Gi"

# Disruption budget: never let voluntary disruptions (node drain, roll) drop us
# below half the replicas.
pdb:
  enabled: true
  minAvailable: 50%

# Zero-downtime rolling deploy: add one new pod before removing any old one, and
# never run below full capacity mid-roll.
rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0

# Graceful shutdown: stop taking traffic, drain in-flight requests, then exit.
terminationGracePeriodSeconds: 60
preStopSleepSeconds: 10

health:
  path: /v1/health
  # Liveness probe path. The shallow `path` above answers in <1ms even when the
  # event loop is badly degraded, so it never restarts a wedged-but-not-dead pod
  # (this is why the 2026-06-18 incident ran 90 min with no auto-recovery). The
  # API also serves /health/live, which returns 503 when event-loop lag is
  # sustained-high → kubelet liveness fails → the pod restarts.
  # DEPLOY ORDER: only set this to /health/live once an image that serves the
  # route is live in this env (an old image would 404 the probe and crash-loop).
  # Empty → falls back to `path` (no behavior change).
  livenessPath: ""
  # startup probe covers slow first-boot (schema/migrations); liveness restarts a
  # hung pod; readiness gates ALB traffic.
  startupFailureThreshold: 30 # 30 * 5s = up to 150s to become healthy
  livenessPeriodSeconds: 15
  readinessPeriodSeconds: 10

serviceAccount:
  name: kortix-api
  # IRSA role ARN that can read the Secrets Manager bundle (from TF output
  # app_irsa_role_arn). REQUIRED.
  roleArn: ""

# External Secrets: sync the shared Secrets Manager bundle into a k8s Secret the
# Deployment consumes via envFrom. This is the SAME secret the ECS task reads.
externalSecrets:
  enabled: true
  region: us-west-2
  secretName: kortix-prod-env # Secrets Manager source bundle (friendly name; ECS references the same secret by its full ARN kortix-prod-env-omifd2)
  targetSecretName: kortix-api-env # synced k8s Secret
  refreshInterval: 1h

# Drizzle migrations as an Argo CD PreSync hook (templates/migrate-job.yaml):
# runs `db:migrate` before the Deployment rolls, gating the release on schema.
# Enable in the env that OWNS the data plane (true for prod); leave false for a
# pre-prod/canary that shares another env's DB and must never migrate it.
migrate:
  enabled: false
  backoffLimit: 0 # fail fast — a bad migration should stop the release, not retry blindly
  activeDeadlineSeconds: 600
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }

# Always-injected non-secret env (PORT is also set from containerPort).
extraEnv: {}

# Environment profile. These render as explicit container env that OVERRIDE the
# synced secret bundle (k8s `env` wins over `envFrom`), so an env can be made
# API-only without changing the shared secret.
env:
  # Override INTERNAL_KORTIX_ENV (dev|staging|prod). "" = inherit from the bundle.
  internalKortixEnv: ""

# Singleton/background work (leader-elected: scheduler, project maintenance,
# legacy + suna migration workers — see apps/api/src/index.ts). workers.enabled
# = false forces the four KORTIX_*_ENABLED flags off, so this env NEVER runs
# singleton jobs even if it wins the Postgres leader lease. Use false for a
# pre-prod / canary that shares prod data; true for the environment that owns
# the background work for its data plane.
workers:
  enabled: true

ingress:
  enabled: true
  host: api-eks.kortix.com
  # ACM cert ARN for the ALB HTTPS listener (from TF output acm_certificate_arn).
  certificateArn: ""
  # Extra hostnames this ALB should also serve (each gets an Ingress rule), and
  # the extra ACM cert ARNs to attach for them (ALB picks the right cert by SNI).
  # Used for cutover: serve the real domain (e.g. dev-api.kortix.com) alongside
  # the EKS-direct name (dev-api-eks.kortix.com). Empty = single-host (default).
  extraHosts: []
  extraCertificateArns: []
  # Join a shared ALB by group name (one LB host-routed across many Ingresses).
  # Empty = a dedicated ALB per Ingress (default). PR previews set this so all
  # ephemeral envs share one ALB instead of one-per-PR.
  albGroup: ""
  # Cloudflare proxies the record (orange cloud) — external-dns sets this.
  cloudflareProxied: true
  # ALB idle timeout (s) — raise for long-lived/streaming requests (matches ECS).
  idleTimeout: 300
  # Lock ALB ingress to Cloudflare IP ranges in prod (recommended). Empty = open.
  inboundCidrs: ""

# Spread pods across AZs and nodes so a node/AZ loss can't take all replicas.
topologySpread:
  enabled: true

# Pod/container hardening. The non-root baseline is safe for the bun image (it
# already runs as USER bun) and is on by default. readOnlyRootFilesystem is
# opt-in: it requires an emptyDir for every runtime write path (writableMounts),
# so it stays off until validated per env (the API writes to /tmp + .kortix-data).
security:
  enabled: true
  runAsNonRoot: true
  # Numeric UID/GID of the image's non-root user (oven/bun ships bun=1000). REQUIRED:
  # with a non-numeric USER (bun) the kubelet can't verify runAsNonRoot and the pod
  # fails CreateContainerConfigError.
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile: RuntimeDefault
  allowPrivilegeEscalation: false
  dropAllCapabilities: true
  readOnlyRootFilesystem: false
  writableMounts:
    - /tmp

priorityClassName: ""

# ServiceMonitor for Prometheus-operator scraping. OFF until (a) the operator CRDs
# exist in the target cluster and (b) the API exposes a Prometheus /metrics route.
serviceMonitor:
  enabled: false
  path: /metrics
  interval: 30s
  labels: {}

# Default-deny NetworkPolicy. OFF by default: ingress is restricted to the API
# port from allowIngressCidrs (the ALB), egress is open to the internet EXCEPT the
# instance metadata endpoint (SSRF/credential-theft hardening; IRSA uses STS, not
# IMDS). Validate on dev before enabling — a misjudged CIDR drops live traffic.
networkPolicy:
  enabled: false
  allowIngressCidrs:
    - 0.0.0.0/0

# PodSecurityAdmission labels on the chart-owned namespace (previews). enforce is
# empty (audit/warn only) so it never blocks; set it to 'baseline' or 'restricted'
# per env once violations are clean. dev/prod namespaces are external — label them
# out-of-band.
podSecurity:
  enforce: ""
  audit: restricted
  warn: restricted
  version: latest

# Progressive delivery (Argo Rollouts). enabled=false → a plain Deployment.
# enabled=true → a canary Rollout that shifts traffic through `steps` while a
# background CloudWatch AnalysisRun watches ALB error-rate + latency and ABORTS
# (auto-rollback to stable) on breach. Per-env (prod enables it post-adoption).
rollout:
  enabled: false
  # FAST canary: a brief soak at each weight while the background analysis watches
  # 5xx/latency. ~1 min total. At prod traffic, 30s yields plenty of metric data;
  # lengthen the pauses if you ever want a longer soak window for a risky release.
  steps:
    - setWeight: 25
    - pause: { duration: 30s }
    - setWeight: 50
    - pause: { duration: 30s }
    - setWeight: 100
  analysis:
    enabled: false
    startingStep: 1 # begin analysis after the first setWeight
    interval: 30s # how often the analysis samples CloudWatch
    # ALB CloudWatch dimensions — set once from the live ALB/target group (stable
    # for the life of the ingress). See infra/GITOPS.md.
    lbArnSuffix: "" # app/<alb-name>/<hex>
    tgArnSuffix: "" # targetgroup/<tg-name>/<hex>
    errorRatePercentThreshold: "1" # fail canary if 5xx rate >= this %
    p95LatencySecondsThreshold: "1.5" # fail canary if p95 target latency >= this
    # Only ASSESS the thresholds once the window has this many requests — below
    # it the sample is too small to judge (a single 5xx = huge rate %), so it
    # passes. Keeps a low-traffic env (pre-cutover) from false-aborting.
    minRequests: "20"

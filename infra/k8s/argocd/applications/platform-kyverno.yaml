# Kyverno admission controller — policy engine for the cluster. Installed from
# the upstream helm chart, all config inline. The admission controller runs HA
# (3 replicas). Policies ship separately (platform-kyverno-policies) and start
# in Audit mode so nothing is ever blocked.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kortix-platform-kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.8.1
    helm:
      releaseName: kyverno
      values: |
        admissionController:
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
        backgroundController:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
        reportsController:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
        cleanupController:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

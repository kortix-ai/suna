# Syncs raw observability CRs (PrometheusRules, and later SLOs/dashboards) from
# git into the monitoring namespace, where the Prometheus operator picks them up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kortix-platform-observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/kortix-ai/suna.git
    targetRevision: main
    path: infra/k8s/observability
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

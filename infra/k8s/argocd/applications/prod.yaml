# Argo CD Application for EKS prod (api-eks.kortix.com).
#
# SINGLE source: render the kortix-api Helm chart with the prod env values via a
# relative path in the SAME repo. (Deliberately NOT multi-source with $values —
# that resolves each source's revision independently and, while the prod branch
# is moving across rapid releases, the two can land on different commits →
# "cannot reference a different revision of the same repository" and a stuck
# sync. A single source has one revision, so it can't race.)
#
# The deploy is whatever this revision of infra/k8s/envs/prod/values.yaml says —
# a PR bumping image.tag IS the release; git revert is the rollback.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kortix-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kortix
  source:
    repoURL: https://github.com/kortix-ai/suna.git
    targetRevision: prod
    path: infra/k8s/charts/kortix-api
    helm:
      releaseName: kortix-api
      valueFiles:
        - ../../envs/prod/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kortix-prod
  # External Secrets Operator's admission webhook injects defaults
  # (conversionStrategy/decodingStrategy/metadataPolicy) into the ExternalSecret,
  # which git doesn't carry — ignore those fields so the app isn't perpetually
  # OutOfSync. ESO owns them; this changes diffing only, nothing in-cluster.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.dataFrom[]?.extract.conversionStrategy
        - .spec.dataFrom[]?.extract.decodingStrategy
        - .spec.dataFrom[]?.extract.metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

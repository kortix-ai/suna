# Argo CD Application for the staging LLM gateway.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kortix-gateway-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kortix
  source:
    repoURL: https://github.com/kortix-ai/suna.git
    targetRevision: staging
    path: infra/k8s/charts/kortix-gateway
    helm:
      releaseName: kortix-gateway
      valueFiles:
        - ../../envs/staging/gateway-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kortix-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

# Metrics + dashboards — kube-prometheus-stack (Prometheus + Grafana + node /
# kube-state metrics + curated dashboards). Grafana is the single observability
# pane for the console; it carries a Loki datasource (platform-logs) so logs and
# metrics share one UI. Served at grafana.kortix.com (host-based) behind the
# shared DevOps ALB + Cloudflare Access.
#
# Single-source: chart from the upstream helm repo, all config inline.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kortix-platform-metrics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.3.2
    helm:
      releaseName: kps
      values: |
        fullnameOverride: kps
        # EKS runs the control plane — these scrape targets aren't reachable,
        # so disable them to avoid permanently-down targets/alerts.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
        alertmanager:
          enabled: true
          alertmanagerSpec:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp2
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
          config:
            route:
              group_by: ["namespace", "alertname"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: "null"
              routes:
                - matchers: ['severity = "critical"']
                  receiver: pagerduty
                  continue: true
                - matchers: ['severity = "warning"']
                  receiver: slack
            receivers:
              - name: "null"
              - name: slack
                slack_configs:
                  - api_url: https://hooks.slack.com/services/REPLACE/ME/PLEASE
                    channel: "#alerts"
                    send_resolved: true
              - name: pagerduty
                pagerduty_configs:
                  - routing_key: REPLACE_WITH_PAGERDUTY_ROUTING_KEY
                    send_resolved: true
            inhibit_rules:
              - source_matchers: ['severity = "critical"']
                target_matchers: ['severity = "warning"']
                equal: ["namespace", "alertname"]
        grafana:
          enabled: true
          service:
            type: ClusterIP
          persistence:
            enabled: true
            storageClassName: gp2
            size: 5Gi
          envFromSecret: grafana-github-oauth
          grafana.ini:
            server:
              domain: grafana.kortix.com
              root_url: "https://%(domain)s/"
            auth:
              disable_login_form: false
            auth.github:
              enabled: true
              allow_sign_up: true
              auto_login: false
              scopes: user:email,read:org
              auth_url: https://github.com/login/oauth/authorize
              token_url: https://github.com/login/oauth/access_token
              api_url: https://api.github.com/user
              allowed_organizations: kortix-ai
              role_attribute_path: "'Editor'"
          ingress:
            enabled: true
            ingressClassName: alb
            path: /
            pathType: Prefix
            hosts:
              - grafana.kortix.com
            annotations:
              alb.ingress.kubernetes.io/group.name: kortix-devops
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
              alb.ingress.kubernetes.io/ssl-redirect: '443'
              alb.ingress.kubernetes.io/backend-protocol: HTTP
              alb.ingress.kubernetes.io/healthcheck-path: /api/health
              alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-2:935064898258:certificate/dd3ed42d-536b-480a-b757-c9b0f1dbe1b6
              alb.ingress.kubernetes.io/inbound-cidrs: 173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22
        prometheus:
          prometheusSpec:
            retention: 7d
            # Accept remote_write from the dev-us cluster's agent (cross-region pane).
            enableRemoteWriteReceiver: true
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: gp2
                  resources:
                    requests:
                      storage: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

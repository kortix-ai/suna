<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Kortix</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-app-region: drag;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .ring {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.14);
        border-top-color: rgba(255, 255, 255, 0.85);
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Update status, driven from the main process (see updater.js). Empty by
         default so it occupies no visual space until there's something to say. */
      #kx-status {
        min-height: 14px;
        font-size: 12px;
        line-height: 14px;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="ring" aria-label="Loading"></div>
      <div id="kx-status" aria-live="polite"></div>
    </div>
  </body>
</html>

services:
  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:3000"
    environment:
      # The Next server's internal /v1 rewrite target. Must be the in-network
      # api service — the old `extra_hosts: localhost:host-gateway` hack only
      # worked when the api port happened to be published on the host at :8008,
      # which is never true in domain mode (500s on every proxied /v1/* path).
      KORTIX_API_PROXY_TARGET: http://kortix-api:8008
      KORTIX_PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      KORTIX_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      KORTIX_PUBLIC_BACKEND_URL: ${API_PUBLIC_URL}/v1
      KORTIX_PUBLIC_BILLING_ENABLED: ${KORTIX_PUBLIC_BILLING_ENABLED}
      KORTIX_PUBLIC_CONNECTORS_ENABLED: ${KORTIX_PUBLIC_CONNECTORS_ENABLED}
      KORTIX_PUBLIC_RESTRICT_ACCOUNT_CREATION: ${KORTIX_PUBLIC_RESTRICT_ACCOUNT_CREATION}
      KORTIX_PUBLIC_APP_URL: ${PUBLIC_URL}
      KORTIX_PUBLIC_AUTH_METHODS: ${KORTIX_PUBLIC_AUTH_METHODS}
      KORTIX_PUBLIC_DISABLE_LANDING_PAGE: ${KORTIX_PUBLIC_DISABLE_LANDING_PAGE}
      SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_SERVER_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      BACKEND_URL: ${API_PUBLIC_URL}/v1
      NODE_OPTIONS: "--max-http-header-size=131072"
    depends_on:
      kortix-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  kortix-migrate:
    image: ${API_IMAGE}
    user: "0:0"
    command: ["bun", "/app/packages/db/scripts/migrate.ts", "bootstrap"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy
    restart: "no"

  kortix-api:
    image: ${API_IMAGE}
    user: "0:0"
    ports:
      - "127.0.0.1:${API_PORT}:8008"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      PORT: "8008"
      SUPABASE_URL: http://supabase-kong:8000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_SANDBOX_PROVIDERS: ${ALLOWED_SANDBOX_PROVIDERS}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY}
      DAYTONA_SERVER_URL: ${DAYTONA_SERVER_URL}
      DAYTONA_TARGET: ${DAYTONA_TARGET}
      # The PUBLIC origin cloud (Daytona) sandboxes call back to — never the
      # internal Docker hostname, which a remote cloud VM can never resolve or
      # reach. Set per reachability mode by the CLI (see reachabilityMode() in
      # self-host/tunnel.ts): the https://api.<domain> origin in domain mode,
      # the cloudflared tunnel's public URL in tunnel mode (captured from the
      # `cloudflared` service's logs after `docker compose up` — see
      # reconcileTunnelReachability() in commands/self-host.ts), or a loopback
      # URL when reachability is unconfigured (agent sessions won't work —
      # the cloud sandbox can't call back to this API in that state).
      KORTIX_URL: ${KORTIX_URL}
      FRONTEND_URL: ${PUBLIC_URL}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_URL},${API_PUBLIC_URL}
      KORTIX_ROUTER_INTERNAL_ENABLED: "false"
      # KORTIX_BILLING_INTERNAL_ENABLED and ENTERPRISE_LICENSE_AVAILABLE are
      # NOT listed here on purpose — this
      # service already has `env_file: .env` above, which loads every key in
      # .env (including these) as container env. An explicit `environment:`
      # entry would take precedence over env_file and silently pin the value
      # regardless of what `kortix self-host configure`/`env set` writes —
      # exactly the bug this fixes (billing used to be hard-pinned "false"
      # here no matter what .env said).
      LLM_GATEWAY_ENABLED: "true"
      # Deliberately NOT set: LLM_GATEWAY_BASE_URL is what gets handed straight
      # to sandboxes as KORTIX_LLM_BASE_URL (see session-sandbox.ts /
      # sandbox-env-sync.ts). It used to be pinned here to the compose-internal
      # `llm-gateway` service (http://llm-gateway:8090/v1/llm) — a hostname a
      # remote Daytona sandbox VM can never resolve, so every BYOK model call
      # failed with opencode's "Cannot connect to API: Was there a typo in the
      # url or port?" the moment a session tried to actually run a turn. Left
      # unset, the fallback in session-sandbox.ts correctly resolves to
      # `${KORTIX_URL}/v1/llm` — kortix-api's own in-process gateway mount,
      # already reachable through the SAME public tunnel/domain origin every
      # other sandbox call already uses. The standalone `llm-gateway` container
      # below still runs (control-plane RPC at /internal/gateway), it's just
      # never the sandbox-facing base URL in self-host.
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-kong:
        condition: service_healthy
      kortix-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8008/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  llm-gateway:
    image: ${GATEWAY_IMAGE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8090"
      KORTIX_API_URL: http://kortix-api:8008
      GATEWAY_INTERNAL_TOKEN: ${GATEWAY_INTERNAL_TOKEN}
    depends_on:
      kortix-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:8090/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  # Auto-updater: once a day, at a fixed local clock time, pulls this stack's
  # image tags and, if anything actually changed, runs the migrate one-shot
  # and rolls the app tier forward with a zero-downtime start-first swap (see
  # assets/updater.sh). This is the entire "update mechanism" — there is no
  # separate systemd/SSM updater. Gated by KORTIX_AUTO_UPDATE (checked by the
  # script itself; off just idles the container — `kortix self-host update`
  # still runs an on-demand pass via the same script regardless). Always
  # present; tzdata is installed on start so KORTIX_UPDATE_TZ (a DST-aware IANA
  # zone, e.g. America/New_York) resolves correctly on the Alpine base image.
  #
  # This container runs `docker compose` AGAINST THE HOST DAEMON over the
  # mounted socket (Docker-outside-of-Docker, not true DinD) — so any relative
  # bind mount in this very compose file (kong's ./volumes/api/kong.yml,
  # supabase-db's ./volumes/db/*, Caddy's ./Caddyfile, ...) gets resolved TWICE:
  # once by the `docker compose` CLI running in here (against ITS OWN cwd) to
  # produce an absolute path, and again by the host daemon that actually has to
  # satisfy that absolute path on ITS filesystem. The two must therefore agree
  # bit-for-bit. Bind-mounting the whole instance directory at the SAME
  # absolute path inside this container as it has on the host (source ==
  # target == KORTIX_INSTANCE_DIR, computed once at render time — see
  # normalizeFullSupabaseEnv() in commands/self-host.ts) and setting
  # `working_dir` to that same path makes every relative path this container
  # resolves also valid on the host, instead of resolving under an
  # in-container-only `/workspace` that the host daemon can't see
  # ("mounts denied: ... is not shared from the host"). Docker Desktop (macOS)
  # shares $HOME with the Linux VM by default, so a path under the operator's
  # home directory is mountable both ways; on native Linux Docker the path
  # trivially exists on "the host" because the daemon IS the host.
  kortix-updater:
    # Pinned by digest, not a floating :latest/:cli tag: this container holds
    # the mounted Docker socket (root-equivalent on the host), so an
    # unreviewed upstream tag move is a direct supply-chain risk, not just an
    # update-stability one. `docker:29.6.1-cli`, digest resolved and recorded
    # 2026-07 from Docker Official Images (multi-arch manifest-list digest —
    # resolves the right arch per host). Trust model: this is the official
    # `docker` image on Docker Hub, the same publisher/registry every other
    # `docker compose pull` in this stack already trusts; the digest pin means
    # a compromised/rotated tag can never silently change what this
    # privileged container runs — bumping it is a reviewed, explicit change
    # to this file (see apps/cli/src/self-host/assets/kortix-compose.yml in
    # git history), the same way every supabase-* image is pinned by digest
    # in compose-assets.ts's pinSupabaseImages().
    image: docker:29.6.1-cli@sha256:862099ada15c669000bef53aa4cb9d821262829f45b0dda2159ccb276443043b
    working_dir: ${KORTIX_INSTANCE_DIR}
    # The trailing "sh" is a placeholder $0 for the `-c` script below; anything
    # `docker compose run kortix-updater <args>` appends lands in "$@" and is
    # forwarded to updater.sh — e.g. `run --rm --no-deps kortix-updater once`
    # runs a single on-demand pass instead of starting the daily scheduler
    # (see `kortix self-host update`, which shells out to exactly this).
    # `./updater.sh` is relative to `working_dir` above (the instance root,
    # where writeKortixRuntimeAssets() always writes it) rather than an
    # absolute in-container path — one less place that has to agree with the
    # render-time KORTIX_INSTANCE_DIR value.
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache tzdata >/dev/null 2>&1 || true; exec /bin/sh ./updater.sh \"$@\"", "sh"]
    environment:
      KORTIX_AUTO_UPDATE: ${KORTIX_AUTO_UPDATE}
      KORTIX_UPDATE_TIME: ${KORTIX_UPDATE_TIME:-02:00}
      KORTIX_UPDATE_TZ: ${KORTIX_UPDATE_TZ:-America/New_York}
      KORTIX_ALLOW_DOWNTIME: ${KORTIX_ALLOW_DOWNTIME:-0}
      KORTIX_COMPOSE_PROJECT: __KORTIX_COMPOSE_PROJECT__
      # Same absolute path as the bind mount + working_dir below — the single
      # source of truth updater.sh reads back instead of hardcoding /workspace
      # (see the comment above this service).
      KORTIX_INSTANCE_DIR: ${KORTIX_INSTANCE_DIR}
      # Target replica count for the api/gateway/frontend start-first roll —
      # decided once at render time by applyReplicaTopology() in
      # compose-assets.ts (2 in domain/prod mode, 1 in laptop mode) so the
      # updater never has to re-derive prod-vs-laptop topology itself.
      KORTIX_APP_REPLICAS: ${KORTIX_APP_REPLICAS:-1}
      # Advanced/rarely-changed updater knobs — every one of these has a
      # sensible built-in default in updater.sh itself (the `${VAR:-default}`
      # on the right); they are only listed here so `kortix self-host env set
      # KORTIX_ROLLOUT_TIMEOUT=...` (etc.) actually reaches the container.
      # Without an explicit `environment:` entry, a key merely present in
      # .env is invisible to this service (unlike kortix-api, this service
      # has no `env_file: .env`, by design — see the volumes comment below).
      KORTIX_ROLLOUT_TIMEOUT: ${KORTIX_ROLLOUT_TIMEOUT:-300}
      KORTIX_CRASH_WATCH_S: ${KORTIX_CRASH_WATCH_S:-20}
      KORTIX_MIN_FREE_DISK_MB: ${KORTIX_MIN_FREE_DISK_MB:-2048}
      # Optional push notification for every run's outcome (ok/degraded/
      # failed/skipped) — one generic env var, no vendor-specific
      # integration. Unset by default (no-op). See notify_webhook() in
      # updater.sh.
      KORTIX_UPDATE_WEBHOOK_URL: ${KORTIX_UPDATE_WEBHOOK_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-write: `docker compose run --rm ... kortix-updater` itself needs
      # no write access here (write_status()/write_breadcrumb() only ever
      # write under the separate /state volume below) — but `docker
      # compose`'s OWN bind-mount resolution for OTHER services (kong.yml,
      # the Postgres data dir, ...) is a read of this same tree from the host
      # daemon's side, not through this mount, so :ro here would be cosmetic
      # either way. Left read-write simply because there is no meaningful
      # confidentiality/integrity boundary between this container (which
      # already holds the Docker socket, i.e. root-equivalent on the host)
      # and the instance directory.
      - ${KORTIX_INSTANCE_DIR}:${KORTIX_INSTANCE_DIR}
      - kortix-updater-state:/state
    # Second layer behind updater.sh's own internal resilience (the scheduler
    # loop never exits on a failed run — see the `run_locked nightly || log
    # ...` call in updater.sh): if this container is ever OOM-killed or
    # crashes outright, Docker restarts it and the scheduler loop resumes
    # from next_run_epoch() on its own, no operator action needed.
    restart: unless-stopped

  # Cloudflare tunnel (opt-in): the "tunnel" reachability mode's zero-config
  # default for exposing kortix-api's public API routes to the internet with
  # no domain/DNS/public IP at all — the laptop path for cloud (Daytona)
  # sandboxes to call back to this instance. Only present in the rendered
  # Compose file when tunnel mode is selected — see renderFullDockerCompose()
  # in compose-assets.ts and reachabilityMode() in self-host/tunnel.ts.
  #
  # Tunnels directly to kortix-api (not through Caddy): Caddy itself is only
  # ever rendered in domain mode, so it is never present alongside this
  # service, and kortix-api already answers every /v1* route the sandbox and
  # any external caller need.
  #
  # Two sub-modes, branched at COMPOSE-RENDER time (see renderFullDockerCompose
  # in compose-assets.ts, driven by namedTunnelConfigured() in
  # self-host/tunnel.ts) — NOT at container start: the official
  # cloudflare/cloudflared image is a distroless-style image with no shell at
  # all (no /bin/sh), so a `entrypoint: [/bin/sh, -c, ...]` branch can never
  # start (`exec: "/bin/sh": stat /bin/sh: no such file or directory`). The
  # command/environment below are the zero-config quick-tunnel default;
  # renderFullDockerCompose() overwrites both when a named tunnel is
  # configured.
  #   - Zero-config quick tunnel (default, no CLOUDFLARE_TUNNEL_TOKEN set): a
  #     fresh https://<random>.trycloudflare.com URL is minted on every start —
  #     EPHEMERAL. `kortix self-host start`/`update` read it back out of this
  #     container's logs and rewrite KORTIX_URL — see
  #     reconcileTunnelReachability() in commands/self-host.ts.
  #   - Named tunnel (CLOUDFLARE_TUNNEL_TOKEN + a hostname bound to it in the
  #     Cloudflare Zero Trust dashboard, via CLOUDFLARE_TUNNEL_HOSTNAME): a
  #     STABLE URL that never changes across restarts — no log-scraping.
  #     cloudflared reads its auth token from the TUNNEL_TOKEN env var natively
  #     (no shell/script needed) when running `tunnel run` with no positional
  #     tunnel name/ID.
  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    command: ["tunnel", "--no-autoupdate", "--url", "http://kortix-api:8008"]
    depends_on:
      kortix-api:
        condition: service_started
    restart: unless-stopped

  # Reverse proxy + TLS (opt-in). Only present in the rendered Compose file
  # when KORTIX_DOMAIN is set — see renderFullDockerCompose() in
  # compose-assets.ts. Terminates ACME HTTP-01 TLS on 80/443 and routes
  # api.<domain> -> kortix-api/llm-gateway and <domain> -> frontend/Kong.
  caddy:
    image: caddy:2.10.2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - kortix-caddy-data:/data
    environment:
      KORTIX_DOMAIN: ${KORTIX_DOMAIN}
      KORTIX_API_DOMAIN: ${KORTIX_API_DOMAIN}
      KORTIX_ACME_EMAIL: ${KORTIX_ACME_EMAIL}
    depends_on:
      kortix-api:
        condition: service_healthy
      llm-gateway:
        condition: service_started
      frontend:
        condition: service_started
      supabase-kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  kortix-updater-state:
  kortix-caddy-data:
